version = "3.6.1"
runner.dialect = scala3

style = defaultWithAlign

maxColumn = 120

align.preset = more

# scalafmt 3.6.1's parser rejects literals like `3.4028235e+38f` (≈ Float.MaxValue)
# as "floating point number too large". The kernels under test rely on the exact
# textual form of the literal, so excluding the file is preferable to rewriting.
project.excludePaths = [
  "glob:**/compiler-testsuite-scala/src/test/scala/polyregion/ValueReturnSuite.scala"
]

rewrite.rules = [
  AvoidInfix
  RedundantBraces
  RedundantParens
  AsciiSortImports
  PreferCurlyFors
]

rewrite.neverInfix.excludeFilters = [until
  to
  by
  eq
  ne
  "should.*"
  "contain.*"
  "must.*"
  in
  be
  taggedAs
  thrownBy
  synchronized
  have
  when
  size
  theSameElementsAs]