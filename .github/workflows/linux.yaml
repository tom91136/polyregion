name: Linux builds

on:
  pull_request:
  push:
  release:
    types: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # XXX Debian release the sysroot is built against; bump together with make_sysroot.py.
  DEBIAN_SYSROOT_DIST: bullseye

jobs:
  codegen-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Regenerate Scala-derived sources
        working-directory: ./frontend
        run: sbt -no-colors 'codegen/genCodegen; passJS/exportPassBundle'

      - name: Format generated C++
        run: clang-format -i native/polyast/generated/*.{h,cpp} native/bindings/jvm/generated/*.{h,cpp}

      - name: Fail if regenerated sources drift
        run: git diff --exit-code -- native/polyast/generated native/bindings/jvm/generated native/polyc/polypass.js

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sysroot_name: amd64
            runs_on: ubuntu-24.04
            llvm_parallel_compile_jobs: "4"
            llvm_parallel_link_jobs: "1"
            flang_parallel_compile_jobs: "3"
          - arch: aarch64
            sysroot_name: arm64
            runs_on: ubuntu-24.04-arm
            llvm_parallel_compile_jobs: "4"
            llvm_parallel_link_jobs: "4"
            flang_parallel_compile_jobs: "3"
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ matrix.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ matrix.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ matrix.flang_parallel_compile_jobs }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        # llvm-tblgen is in llvm; gfortran is needed at LLVM-runtimes configure time so
        # flang-rt's enable_language(Fortran) succeeds.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang lld llvm gfortran libcrypt-dev libltdl-dev zlib1g-dev python3-requests default-jdk

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - name: Restore sysroot cache
        if: ${{ !env.ACT }}
        id: restore-sysroot
        uses: actions/cache/restore@v5
        with:
          path: ./native/debian-sysroot-image-creator/out/sysroot-build/${{ env.DEBIAN_SYSROOT_DIST }}/debian_${{ env.DEBIAN_SYSROOT_DIST }}_${{ matrix.sysroot_name }}_sysroot.tar.xz
          key: sysroot-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/make_sysroot.py') }}

      - name: Build sysroot
        id: build-sysroot
        if: steps.restore-sysroot.outputs.cache-hit != 'true'
        working-directory: ./native
        run: ./make_sysroot.py build ${{ matrix.sysroot_name }}

      - name: Save sysroot cache
        if: steps.build-sysroot.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: ./native/debian-sysroot-image-creator/out/sysroot-build/${{ env.DEBIAN_SYSROOT_DIST }}/debian_${{ env.DEBIAN_SYSROOT_DIST }}_${{ matrix.sysroot_name }}_sysroot.tar.xz
          key: sysroot-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/make_sysroot.py') }}

      - name: Prepare sysroot
        working-directory: ./native/debian-sysroot-image-creator
        run: |
          mkdir -p "sysroot_${{ matrix.sysroot_name }}"
          tar xf out/sysroot-build/${{ env.DEBIAN_SYSROOT_DIST }}/debian_${{ env.DEBIAN_SYSROOT_DIST }}_${{ matrix.sysroot_name }}_sysroot.tar.xz  -C ./sysroot_${{ matrix.sysroot_name }}
          echo "SYSROOT_PATH=$PWD/sysroot_${{ matrix.sysroot_name }}" >> $GITHUB_ENV

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: |
            ./native/polyregion-Release-${{ matrix.arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=Release -DARCH=${{ matrix.arch }} -DACTION=LLVM -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: |
            ./native/polyregion-Release-${{ matrix.arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Restore device libs cache
        if: ${{ !env.ACT }}
        id: restore-device-libs
        uses: actions/cache/restore@v5
        with:
          path: ./native/thirdparty/device_libs
          key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build device libs
        id: build-device-libs
        if: steps.restore-device-libs.outputs.cache-hit != 'true'
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=Release -DARCH=${{ matrix.arch }} -DACTION=DEVICE_LIBS -P build.cmake

      - name: Save device libs cache
        if: steps.build-device-libs.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: ./native/thirdparty/device_libs
          key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Configure release build
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=Release -DARCH=${{ matrix.arch }} -DACTION=CONFIGURE -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Build dist
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=Release -DARCH=${{ matrix.arch }} -DACTION=DIST -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Build test dist
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=Release -DARCH=${{ matrix.arch }} -DACTION=DIST_TEST -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Check artefact
        working-directory: ./native
        if: always()
        run: |
          DIST=polyregion-Release-${{ matrix.arch }}-dylib-dist
          ls -lah "$DIST/bin" "$DIST/lib"
          inspect () {
            local f="$1"
            if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
            file "$f"
            objdump -p "$f" | grep -E '^\s+NEEDED' || true
            echo "----"
          }
          for b in polyc polycpp polyfc clang++ flang-new; do
            inspect "$DIST/bin/$b"
          done
          for l in "$DIST"/lib/libpolyc-JNI.so "$DIST"/lib/libpolyc-JNIshim.so "$DIST"/lib/libpolyinvoke-JNI.so; do
            inspect "$l"
          done

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Upload test dist
        uses: actions/upload-artifact@v7
        with:
          name: polyregion-tests-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

  dist-check:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          DIST=polyregion-Release-${{ matrix.arch }}-dylib-dist
          find "$DIST/bin" -type f -exec chmod +x {} +
          find "$DIST/lib" -type f -name '*.so' -exec chmod +x {} +

      - name: Run dist-check
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=Release -DARCH=${{ matrix.arch }} -DACTION=CHECK -P build.cmake

  native-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download test dist
        uses: actions/download-artifact@v8
        with:
          name: polyregion-tests-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          for d in polyregion-Release-${{ matrix.arch }}-dylib-dist polyregion-test-Release-${{ matrix.arch }}-dylib-dist; do
            if [[ -d "$d/bin" ]]; then find "$d/bin" -type f -exec chmod +x {} +; fi
            if [[ -d "$d/lib" ]]; then find "$d/lib" -type f -name '*.so' -exec chmod +x {} +; fi
          done

      - name: Run native tests
        working-directory: ./native
        run: |
          DIST=$PWD/polyregion-Release-${{ matrix.arch }}-dylib-dist
          TESTS=$PWD/polyregion-test-Release-${{ matrix.arch }}-dylib-dist
          export PATH=$DIST/bin:$PATH
          export LD_LIBRARY_PATH=$DIST/lib:${LD_LIBRARY_PATH:-}
          export POLYREGION_BITCODE_DIR=$DIST/lib
          export POLYTEST_CLANG_DRIVER=$DIST/bin/clang++
          export POLYTEST_FLANG_DRIVER=$DIST/bin/flang-new
          ctest --test-dir "$TESTS" -LE device --output-on-failure --output-junit "$TESTS/native-test-results.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-test-results-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/native-test-results.xml
          if-no-files-found: warn

  scala-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Stage JNI libs at Loader-searched path
        # XXX Loader.java probes ../native/cmake-build-release-clang/bindings/jvm/ etc. from sbt's
        # frontend/ cwd; the CI dist puts the JNI .so's under lib/. Bridge via copy.
        run: |
          DIST=./native/polyregion-Release-${{ matrix.arch }}-dylib-dist
          mkdir -p native/cmake-build-release-clang/bindings/jvm
          for f in libpolyc-JNI.so libpolyc-JNIshim.so libpolyinvoke-JNI.so; do
            chmod +x "$DIST/lib/$f" || true
            cp "$DIST/lib/$f" native/cmake-build-release-clang/bindings/jvm/
          done

      - name: Run munit suite
        working-directory: ./frontend
        run: sbt -no-colors 'compiler-testsuite-scala/test'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scala-test-results-linux-${{ matrix.arch }}-Release
          path: ./frontend/compiler-testsuite-scala/target/test-reports/
          if-no-files-found: warn
