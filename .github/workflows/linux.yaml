name: Linux builds

on:
  pull_request:
  push:
  release:
    types: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # AL8 = glibc 2.28, gcc-toolset-12 libstdc++
  SYSROOT_VARIANT: al8

jobs:
  codegen-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Regenerate Scala-derived sources
        run: just _codegen-sbt

      - name: Format generated C++
        run: just _codegen-format

      - name: Fail if regenerated sources drift
        run: just _codegen-diff

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
            llvm_parallel_compile_jobs: "4"
            llvm_parallel_link_jobs: "1"
            flang_parallel_compile_jobs: "3"
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
            llvm_parallel_compile_jobs: "4"
            llvm_parallel_link_jobs: "4"
            flang_parallel_compile_jobs: "3"
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ matrix.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ matrix.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ matrix.flang_parallel_compile_jobs }}
    steps:
      - uses: actions/checkout@v6

      - name: Max parallelism under act
        if: ${{ env.ACT }}
        run: |
          echo "POLYREGION_LLVM_PARALLEL_COMPILE_JOBS=" >> "$GITHUB_ENV"
          echo "POLYREGION_LLVM_PARALLEL_LINK_JOBS=" >> "$GITHUB_ENV"
          echo "POLYREGION_FLANG_PARALLEL_COMPILE_JOBS=" >> "$GITHUB_ENV"

      - name: Install dependencies
        # clang-tools provides clang-scan-deps (cmake >= 3.28 uses it for C++20 module deps).
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-tools lld llvm gfortran libcrypt-dev libltdl-dev zlib1g-dev python3-requests

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - name: Restore sysroot cache
        if: ${{ !env.ACT }}
        id: restore-sysroot
        uses: actions/cache/restore@v5
        with:
          path: ./native/out/sysroot-build/${{ env.SYSROOT_VARIANT }}/sysroot-${{ env.SYSROOT_VARIANT }}-${{ matrix.arch }}.tar.xz
          key: sysroot-${{ env.SYSROOT_VARIANT }}-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/make_sysroot.sh') }}

      - name: Detect existing sysroot tarball (act fast-path)
        if: ${{ env.ACT }}
        id: act-sysroot-probe
        run: |
          [ -f native/out/sysroot-build/${{ env.SYSROOT_VARIANT }}/sysroot-${{ env.SYSROOT_VARIANT }}-${{ matrix.arch }}.tar.xz ] && echo "found=true" >> "$GITHUB_OUTPUT" || true

      - name: Build sysroot
        id: build-sysroot
        if: steps.restore-sysroot.outputs.cache-hit != 'true' && steps.act-sysroot-probe.outputs.found != 'true'
        working-directory: ./native
        run: ./make_sysroot.sh ${{ matrix.arch }}

      - name: Save sysroot cache
        if: steps.build-sysroot.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: ./native/out/sysroot-build/${{ env.SYSROOT_VARIANT }}/sysroot-${{ env.SYSROOT_VARIANT }}-${{ matrix.arch }}.tar.xz
          key: sysroot-${{ env.SYSROOT_VARIANT }}-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/make_sysroot.sh') }}

      - name: Prepare sysroot
        working-directory: ./native
        run: |
          STAGE=out/sysroot-build/${{ env.SYSROOT_VARIANT }}/extracted-${{ matrix.arch }}
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          tar xf out/sysroot-build/${{ env.SYSROOT_VARIANT }}/sysroot-${{ env.SYSROOT_VARIANT }}-${{ matrix.arch }}.tar.xz -C "$STAGE"
          echo "SYSROOT_PATH=$PWD/$STAGE" >> "$GITHUB_ENV"

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: |
            ./native/polyregion-Release-${{ matrix.arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './native/make_sysroot.sh') }}

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Detect existing LLVM/device-libs (act fast-path)
        if: ${{ env.ACT }}
        id: act-cache-probe
        run: |
          [ -x native/polyregion-Release-${{ matrix.arch }}-dylib-dist/bin/clang++ ] && echo "llvm=true" >> "$GITHUB_OUTPUT" || true
          [ -d native/thirdparty/device_libs ] && [ -n "$(ls -A native/thirdparty/device_libs 2>/dev/null)" ] && echo "device-libs=true" >> "$GITHUB_OUTPUT" || true

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true' && steps.act-cache-probe.outputs.llvm != 'true'
        run: just llvm

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: |
            ./native/polyregion-Release-${{ matrix.arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './native/make_sysroot.sh') }}

      - name: Restore device libs cache
        if: ${{ !env.ACT }}
        id: restore-device-libs
        uses: actions/cache/restore@v5
        with:
          path: ./native/thirdparty/device_libs
          key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './native/make_sysroot.sh') }}

      - name: Build device libs
        id: build-device-libs
        if: steps.restore-device-libs.outputs.cache-hit != 'true' && steps.act-cache-probe.outputs.device-libs != 'true'
        run: just device-libs

      - name: Save device libs cache
        if: steps.build-device-libs.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: ./native/thirdparty/device_libs
          key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './native/make_sysroot.sh') }}

      - name: Configure release build
        run: just configure

      - name: Build dist
        run: just dist

      - name: Build test dist
        run: just test-dist

      - name: Check artefact
        working-directory: ./native
        if: always()
        run: |
          DIST=polyregion-Release-${{ matrix.arch }}-dylib-dist
          ls -lah "$DIST/bin" "$DIST/lib"
          inspect () {
            local f="$1"
            if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
            file "$f"
            objdump -p "$f" | grep -E '^\s+NEEDED' || true
            echo "----"
          }
          for b in polyc polycpp polyfc clang++ flang-new; do
            inspect "$DIST/bin/$b"
          done
          for l in "$DIST"/lib/libpolyc-JNI.so "$DIST"/lib/libpolyc-JNIshim.so "$DIST"/lib/libpolyinvoke-JNI.so; do
            inspect "$l"
          done

      - name: Upload dist
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Upload test dist
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-tests-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

  dist-check:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        distro:
          - { image: 'almalinux:8',  pkg: 'dnf install -y --skip-unavailable git cmake findutils tar gzip gcc-c++ libquadmath' }
          - { image: 'almalinux:9',  pkg: 'dnf install -y --skip-unavailable git cmake findutils tar gzip gcc-c++ libquadmath' }
          - { image: 'almalinux:10', pkg: 'dnf install -y --skip-unavailable git cmake findutils tar gzip gcc-c++ libquadmath' }
          - { image: 'ubuntu:22.04', pkg: 'apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git cmake findutils curl g++ libquadmath0' }
          - { image: 'ubuntu:24.04', pkg: 'apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git cmake findutils curl g++ libquadmath0' }
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    container: ${{ matrix.distro.image }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - name: Install container dependencies
        run: ${{ matrix.distro.pkg }}

      - uses: actions/checkout@v6

      - name: Setup just
        # XXX direct install as alma/ubuntu containers has no nodejs, so extractions/setup-just (node20) fails
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Download dist
        # XXX Under act the workspace is bind-mounted; the dist is already at this path.
        if: ${{ !env.ACT }}
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          DIST=polyregion-Release-${{ matrix.arch }}-dylib-dist
          find "$DIST/bin" -type f -exec chmod +x {} +
          find "$DIST/lib" -type f -name '*.so' -exec chmod +x {} +

      - name: Run dist-check
        run: just dist-check

  native-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download test dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-tests-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          for d in polyregion-Release-${{ matrix.arch }}-dylib-dist polyregion-test-Release-${{ matrix.arch }}-dylib-dist; do
            if [[ -d "$d/bin" ]]; then find "$d/bin" -type f -exec chmod +x {} +; fi
            if [[ -d "$d/lib" ]]; then find "$d/lib" -type f -name '*.so' -exec chmod +x {} +; fi
          done

      - name: Run native tests
        working-directory: ./native
        run: |
          DIST=$PWD/polyregion-Release-${{ matrix.arch }}-dylib-dist
          TESTS=$PWD/polyregion-test-Release-${{ matrix.arch }}-dylib-dist
          export PATH=$DIST/bin:$PATH
          export LD_LIBRARY_PATH=$DIST/lib:${LD_LIBRARY_PATH:-}
          export POLYREGION_BITCODE_DIR=$DIST/lib
          export POLYTEST_CLANG_DRIVER=$DIST/bin/clang++
          export POLYTEST_FLANG_DRIVER=$DIST/bin/flang-new
          ctest --test-dir "$TESTS" -LE device --output-on-failure --output-junit "$TESTS/native-test-results.xml"

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: native-test-results-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/native-test-results.xml
          if-no-files-found: warn

  scala-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Stage JNI libs at Loader-searched path
        # XXX Loader.java probes ../native/cmake-build-release-clang/bindings/jvm/ etc. from sbt's
        # frontend/ cwd; the CI dist puts the JNI .so's under lib/. Bridge via copy.
        run: |
          DIST=./native/polyregion-Release-${{ matrix.arch }}-dylib-dist
          mkdir -p native/cmake-build-release-clang/bindings/jvm
          for f in libpolyc-JNI.so libpolyc-JNIshim.so libpolyinvoke-JNI.so; do
            chmod +x "$DIST/lib/$f" || true
            cp "$DIST/lib/$f" native/cmake-build-release-clang/bindings/jvm/
          done

      - name: Run munit suite
        # LD_LIBRARY_PATH so the JNI dlopen resolves libLLVM/libMLIR/libclang-cpp from the dist
        # regardless of which Loader.java probe path wins (cmake-build-*/, build-*-dylib/, etc.).
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/native/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib
        run: just scala-tests

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: scala-test-results-linux-${{ matrix.arch }}-Release
          path: ./frontend/compiler-testsuite-scala/target/test-reports/
          if-no-files-found: warn
