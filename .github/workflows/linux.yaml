name: Linux builds

on:
  pull_request:
  push:
  release:
    types: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check-codegen:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Regenerate Scala-derived sources
        run: just _codegen-sbt

      - name: Format generated C++
        run: just _codegen-format

      - name: Fail if regenerated sources drift
        run: just _codegen-diff

  pass-js:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Build pass bundle (js)
        run: just pass-js

      - name: Verify bundle staged
        run: |
          test -s native/polyc/polypass.js
          echo "polypass.js size: $(wc -c < native/polyc/polypass.js) bytes"

  # Per-arch build jobs so downstream can proceed for the arch that built even if the other is red.
  build-x86_64:
    runs-on: ubuntu-24.04
    env:
      POLYREGION_ARCH: x86_64
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: "4"
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: "4"
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: "2"
      POLYC_PASS_BUNDLE: dso
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-linux
        with:
          arch: x86_64
          act: ${{ env.ACT }}

  build-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      POLYREGION_ARCH: aarch64
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: "4"
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: "4"
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: "3"
      POLYC_PASS_BUNDLE: dso
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-linux
        with:
          arch: aarch64
          act: ${{ env.ACT }}

  check-dist:
    needs: [build-x86_64, build-aarch64]
    # Run for whichever arch built; the leg whose build failed has no artifact and goes red on download.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        distro:
          - { image: 'almalinux:8',  pkg: 'dnf install -y --setopt=strict=0 git cmake findutils tar gzip gcc-c++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath)' }
          - { image: 'almalinux:9',  pkg: 'dnf install -y --setopt=strict=0 git cmake findutils tar gzip gcc-c++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath)' }
          - { image: 'almalinux:10', pkg: 'dnf install -y --setopt=strict=0 git cmake findutils tar gzip gcc-c++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath)' }
          - { image: 'ubuntu:22.04', pkg: 'apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git cmake findutils curl g++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath0)' }
          - { image: 'ubuntu:24.04', pkg: 'apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git cmake findutils curl g++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath0)' }
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    container: ${{ matrix.distro.image }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - name: Install container dependencies
        run: ${{ matrix.distro.pkg }}

      - uses: actions/checkout@v6

      - name: Setup just
        # XXX direct install as alma/ubuntu containers has no nodejs, so extractions/setup-just (node20) fails
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Download dist
        # XXX Under act the workspace is bind-mounted; the dist is already at this path.
        if: ${{ !env.ACT }}
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          DIST=out/polyregion-Release-${{ matrix.arch }}-dylib-dist
          find "$DIST/bin" -type f -exec chmod +x {} +
          find "$DIST/lib" -type f -name '*.so' -exec chmod +x {} +

      - name: Run check-dist
        run: just check-dist

      - name: Annotate dist-check results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/build-dist-check-${{ matrix.arch }}-dylib/dist-check-results.xml
          label: dist-check

  test-native:
    needs: [build-x86_64, build-aarch64]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download test dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-tests-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          for d in out/polyregion-Release-${{ matrix.arch }}-dylib-dist out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist; do
            if [[ -d "$d/bin" ]]; then find "$d/bin" -type f -exec chmod +x {} +; fi
            if [[ -d "$d/lib" ]]; then find "$d/lib" -type f -name '*.so' -exec chmod +x {} +; fi
          done

      - name: Run native tests
        working-directory: ./native
        run: |
          DIST=$PWD/out/polyregion-Release-${{ matrix.arch }}-dylib-dist
          TESTS=$PWD/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist
          export PATH=$DIST/bin:$PATH
          export LD_LIBRARY_PATH=$DIST/lib:${LD_LIBRARY_PATH:-}
          export POLYREGION_BITCODE_DIR=$DIST/lib
          export POLYPASS_PLUGINS=$DIST/lib/libpolypass.so
          export POLYTEST_CLANG_DRIVER=$DIST/bin/clang++
          export POLYTEST_FLANG_DRIVER=$DIST/bin/flang-new
          ctest --test-dir "$TESTS" -LE device --timeout 300 --output-on-failure --output-junit "$TESTS/native-test-results.xml"

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/native-test-results.xml
          label: ctest

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: native-test-results-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/native-test-results.xml
          if-no-files-found: warn

  test-scala:
    needs: [build-x86_64, build-aarch64]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Run munit suite
        env:
          POLYREGION_NATIVE_LIB_DIR: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib
          POLYPASS_PLUGINS: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib/libpolypass.so
        run: just test-scala

      - name: Annotate scala results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: frontend/compiler-testsuite-scala/target/test-reports
          label: scala

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: scala-test-results-linux-${{ matrix.arch }}-Release
          path: ./frontend/compiler-testsuite-scala/target/test-reports/
          if-no-files-found: warn
