name: Linux builds

on:
  pull_request:
  push:
  release:
    types: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # AL8 = glibc 2.28, gcc-toolset-12 libstdc++
  SYSROOT_VARIANT: al8

jobs:
  check-codegen:
    runs-on: ubuntu-24.04
    steps:
      - uses: &checkout actions/checkout@v6

      - &setup-java
        name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - &setup-sbt
        name: Setup sbt
        uses: sbt/setup-sbt@v1

      - &setup-just
        name: Setup just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Regenerate Scala-derived sources
        run: just _codegen-sbt

      - name: Format generated C++
        run: just _codegen-format

      - name: Fail if regenerated sources drift
        run: just _codegen-diff

  pass-js:
    runs-on: ubuntu-24.04
    steps:
      - uses: *checkout
      - *setup-java
      - *setup-sbt
      - *setup-just

      - name: Build pass bundle (js)
        run: just build-pass-js

      - name: Verify bundle staged
        run: |
          test -s native/polyc/polypass.js
          echo "polypass.js size: $(wc -c < native/polyc/polypass.js) bytes"

  build-llvm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
            llvm_parallel_compile_jobs: "4"
            llvm_parallel_link_jobs: "4"
            flang_parallel_compile_jobs: "2"
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
            llvm_parallel_compile_jobs: "4"
            llvm_parallel_link_jobs: "4"
            flang_parallel_compile_jobs: "3"
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ matrix.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ matrix.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ matrix.flang_parallel_compile_jobs }}
    steps:
      - &free-disk
        name: Free up disk space
        if: ${{ !env.ACT }}
        uses: justinthelaw/maximize-github-runner-space@v0.9.0
        with:
          cleanup-profile: custom
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-dotnet: 'true'

      - uses: *checkout

      - name: Max parallelism under act
        if: ${{ env.ACT }}
        run: |
          {
            echo "POLYREGION_LLVM_PARALLEL_COMPILE_JOBS="
            echo "POLYREGION_LLVM_PARALLEL_LINK_JOBS="
            echo "POLYREGION_FLANG_PARALLEL_COMPILE_JOBS="
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-tools lld llvm g++ gfortran libcrypt-dev libltdl-dev zlib1g-dev python3-requests

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - *setup-just

      - name: Restore sysroot cache
        if: ${{ !env.ACT }}
        id: restore-sysroot
        uses: &cache-restore actions/cache/restore@v5
        with:
          path: &sysroot-path ./sysroot/out/sysroot-${{ env.SYSROOT_VARIANT }}-${{ matrix.arch }}.tar.xz
          key: &sysroot-key sysroot-${{ env.SYSROOT_VARIANT }}-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./sysroot/Dockerfile') }}

      - name: Build sysroot
        id: build-sysroot
        if: steps.restore-sysroot.outputs.cache-hit != 'true'
        env:
          CONTAINER: docker
        run: just build-sysroot

      - name: Save sysroot cache
        if: steps.build-sysroot.outcome == 'success'
        uses: &cache-save actions/cache/save@v5
        with:
          path: *sysroot-path
          key: *sysroot-key

      - name: Prepare sysroot
        run: |
          just prepare-sysroot
          echo "SYSROOT_PATH=$PWD/sysroot/out/${{ matrix.arch }}" >> "$GITHUB_ENV"

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: *cache-restore
        with:
          path: &llvm-path |
            ./native/out/polyregion-Release-${{ matrix.arch }}-*-dist
          key: &llvm-key llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './sysroot/Dockerfile', './native/llvm-patches/*.patch', './native/llvm-patches-*/*.patch') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        run: just build-llvm

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: *cache-save
        with:
          path: *llvm-path
          key: *llvm-key

      - name: Pack LLVM dist
        run: tar czf llvm-dist.tar.gz -C native/out polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Upload LLVM
        if: ${{ !env.ACT }}
        uses: &upload actions/upload-artifact@v7
        with:
          name: polyregion-llvm-linux-${{ matrix.arch }}
          path: llvm-dist.tar.gz
          compression-level: 0
          if-no-files-found: error

  build:
    needs: build-llvm
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
      POLYC_PASS_BUNDLE: dso
    steps:
      - *free-disk

      - uses: *checkout

      - name: Max parallelism under act
        if: ${{ env.ACT }}
        run: |
          {
            echo "POLYREGION_LLVM_PARALLEL_COMPILE_JOBS="
            echo "POLYREGION_LLVM_PARALLEL_LINK_JOBS="
            echo "POLYREGION_FLANG_PARALLEL_COMPILE_JOBS="
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        # clang-tools provides clang-scan-deps (cmake >= 3.28 uses it for C++20 module deps).
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-tools lld llvm g++ gfortran libcrypt-dev libltdl-dev zlib1g-dev python3-requests

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - *setup-sbt

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - *setup-just

      - name: Restore sysroot cache
        if: ${{ !env.ACT }}
        id: restore-sysroot
        uses: *cache-restore
        with:
          path: *sysroot-path
          key: *sysroot-key

      - name: Detect existing sysroot tarball (act fast-path)
        if: ${{ env.ACT }}
        id: act-sysroot-probe
        run: |
          [ -f sysroot/out/sysroot-${{ env.SYSROOT_VARIANT }}-${{ matrix.arch }}.tar.xz ] && echo "found=true" >> "$GITHUB_OUTPUT" || true

      - name: Build sysroot
        id: build-sysroot
        if: steps.restore-sysroot.outputs.cache-hit != 'true' && steps.act-sysroot-probe.outputs.found != 'true'
        env:
          CONTAINER: docker
        run: just build-sysroot

      - name: Save sysroot cache
        if: steps.build-sysroot.outcome == 'success'
        uses: *cache-save
        with:
          path: *sysroot-path
          key: *sysroot-key

      - name: Prepare sysroot
        run: |
          just prepare-sysroot
          echo "SYSROOT_PATH=$PWD/sysroot/out/${{ matrix.arch }}" >> "$GITHUB_ENV"

      - name: Download LLVM
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v8
        with:
          name: polyregion-llvm-linux-${{ matrix.arch }}
          path: .

      - name: Unpack LLVM
        if: ${{ !env.ACT }}
        run: |
          mkdir -p native/out
          tar xzf llvm-dist.tar.gz -C native/out

      - name: Detect existing device-libs (act fast-path)
        if: ${{ env.ACT }}
        id: act-cache-probe
        run: |
          [ -d native/thirdparty/device_libs ] && [ -n "$(ls -A native/thirdparty/device_libs 2>/dev/null)" ] && echo "device-libs=true" >> "$GITHUB_OUTPUT" || true

      - name: Restore device libs cache
        if: ${{ !env.ACT }}
        id: restore-device-libs
        uses: *cache-restore
        with:
          path: &devlibs-path ./native/thirdparty/device_libs
          key: &devlibs-key device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './sysroot/Dockerfile', './native/llvm-patches/*.patch', './native/llvm-patches-*/*.patch') }}

      - name: Build device libs
        id: build-device-libs
        if: steps.restore-device-libs.outputs.cache-hit != 'true' && steps.act-cache-probe.outputs.device-libs != 'true'
        run: just build-device-libs

      - name: Save device libs cache
        if: steps.build-device-libs.outcome == 'success'
        uses: *cache-save
        with:
          path: *devlibs-path
          key: *devlibs-key

      - name: Restore vcpkg cache
        if: ${{ !env.ACT }}
        id: restore-vcpkg
        uses: *cache-restore
        with:
          path: &vcpkg-path ./native/.vcpkg/vcpkg_installed
          key: &vcpkg-key vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/vcpkg.json', './native/vcpkg-configuration.json', './native/toolchains/*.cmake', './native/.env') }}

      - name: Install vcpkg dependencies
        id: build-vcpkg
        if: steps.restore-vcpkg.outputs.cache-hit != 'true'
        run: just build-vcpkg-deps

      - name: Save vcpkg cache
        if: steps.build-vcpkg.outcome == 'success'
        uses: *cache-save
        with:
          path: *vcpkg-path
          key: *vcpkg-key

      - name: Build pass bundle (dso)
        run: just build-pass-native

      - name: Configure release build
        run: just configure

      - name: Build dist
        run: just build-dist

      - name: Build test dist (host profile)
        run: just build-test-dist

      - name: Check artefact
        if: always()
        run: just check-dist-deps native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Upload dist
        if: ${{ !env.ACT }}
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Upload test dist
        if: ${{ !env.ACT }}
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: polyregion-tests-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Build test dist (emulators profile)
        env:
          POLYREGION_TEST_PROFILE: emulators
        run: |
          find native/out -path '*/polytest-discover/*.ids' -delete
          just build-test-dist

      - name: Upload test dist (emulators)
        if: ${{ !env.ACT }}
        uses: *upload
        with:
          name: polyregion-tests-emulators-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: List shards
        run: just list-shards emulators > shards.txt

      - name: Upload shards
        if: ${{ !env.ACT }}
        uses: *upload
        with:
          name: polyregion-shards-linux-${{ matrix.arch }}
          path: shards.txt
          if-no-files-found: error

      - name: Stage just
        run: install -D "$(command -v just)" just-dist/just

      - name: Upload just
        if: ${{ !env.ACT }}
        uses: *upload
        with:
          name: just-linux-${{ matrix.arch }}
          path: just-dist/just
          if-no-files-found: error

  build-emulators:
    strategy:
      fail-fast: false
      matrix:
        include: &simple-matrix
          - arch: x86_64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - *free-disk

      - uses: *checkout
      - *setup-just

      - name: Restore emulators cache
        if: ${{ !env.ACT }}
        id: restore-emu
        uses: *cache-restore
        with:
          path: &emu-path ./emulators/out
          key: &emu-key emulators-linux-${{ matrix.arch }}-${{ hashFiles('./emulators/Dockerfile', './emulators/collect.sh', './emulators/gpuocelot.patch') }}

      - name: Detect existing emulators (act fast-path)
        if: ${{ env.ACT }}
        id: act-emu-probe
        run: |
          [ -f emulators/out/env.sh ] && echo "found=true" >> "$GITHUB_OUTPUT" || true

      - name: Build emulators
        id: build-emulators
        if: steps.restore-emu.outputs.cache-hit != 'true' && steps.act-emu-probe.outputs.found != 'true'
        env:
          CONTAINER: docker
        run: just build-emulators

      - name: Save emulators cache
        if: steps.build-emulators.outcome == 'success'
        uses: *cache-save
        with:
          path: *emu-path
          key: *emu-key

      - name: Pack emulators (tar preserves symlinks)
        run: tar czf emulators-out.tar.gz -C emulators out

      - name: Upload emulators artifact
        if: ${{ !env.ACT }}
        uses: *upload
        with:
          name: polyregion-emulators-linux-${{ matrix.arch }}
          path: emulators-out.tar.gz
          if-no-files-found: error

  check-dist:
    needs: build
    # Run for whichever arch built; the leg whose build failed has no artifact and goes red on download.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        distro:
          - { image: 'almalinux:8',  pkg: 'dnf install -y --setopt=strict=0 git cmake findutils tar gzip gcc-c++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath)' }
          - { image: 'almalinux:9',  pkg: 'dnf install -y --setopt=strict=0 git cmake findutils tar gzip gcc-c++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath)' }
          - { image: 'almalinux:10', pkg: 'dnf install -y --setopt=strict=0 git cmake findutils tar gzip gcc-c++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath)' }
          - { image: 'ubuntu:22.04', pkg: 'apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git cmake findutils curl g++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath0)' }
          - { image: 'ubuntu:24.04', pkg: 'apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git cmake findutils curl g++ python3 $([ "$POLYREGION_ARCH" = x86_64 ] && echo libquadmath0)' }
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    container: ${{ matrix.distro.image }}
    env: &arch-env
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - name: Install container dependencies
        run: ${{ matrix.distro.pkg }}

      - uses: *checkout

      - name: Download just
        # XXX JS setup actions fail in node-less containers; download the host-built musl binary instead.
        if: ${{ !env.ACT }}
        uses: &download actions/download-artifact@v8
        with:
          name: just-linux-${{ matrix.arch }}
          path: just-bin

      - name: Setup just
        run: |
          if [ -f just-bin/just ]; then install -m755 just-bin/just /usr/local/bin/just
          else curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin; fi

      - name: Download dist
        # XXX Under act the workspace is bind-mounted; the dist is already at this path.
        if: ${{ !env.ACT }}
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        run: just restore-exec-bits native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Run check-dist
        run: just check-dist

      - name: Annotate dist-check results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/build-dist-check-${{ matrix.arch }}-dylib/dist-check-results.xml
          label: dist-check

  discover-shards:
    needs: build
    runs-on: ubuntu-24.04
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - name: Download shards
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-shards-linux-x86_64
          path: .
      - id: gen
        name: Build shard matrix
        run: |
          if [ -f shards.txt ]; then shards=$(jq -R -s -c '[split("\n")[] | select(length > 0)]' shards.txt); else shards='[]'; fi
          echo "shards=$shards" >> "$GITHUB_OUTPUT"
          echo "shards: $shards"

  test-native-misc:
    needs: [build, build-emulators]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout

      - *setup-just

      - &apt-cmake
        name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Download dist
        if: ${{ !env.ACT }}
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download test dist
        if: ${{ !env.ACT }}
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-tests-emulators-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Download emulators
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-emulators-linux-${{ matrix.arch }}
          path: ./emulators

      - name: Unpack emulators
        if: ${{ !env.ACT }}
        run: tar xzf emulators/emulators-out.tar.gz -C emulators

      - &restore-exec
        name: Restore executable bits
        run: just restore-exec-bits native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Enable core dumps
        run: |
          sudo mkdir -p /var/lib/polyregion-cores && sudo chmod 1777 /var/lib/polyregion-cores || true
          echo '/var/lib/polyregion-cores/core.%e.%p' | sudo tee /proc/sys/kernel/core_pattern || true

      - name: Run misc tests (non-codegen)
        run: |
          ulimit -c unlimited || true
          just test-native-dist emulators misc-test-results -LE codegen --repeat until-pass:3

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/misc-test-results.xml
          label: ctest-misc

      - name: Upload test results
        if: ${{ always() && !env.ACT }}
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: misc-test-results-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/misc-test-results.xml
          if-no-files-found: warn

      # always() not failure(): --repeat until-pass recovers transient crashes, but the core is still on disk
      - name: Collect crash backtraces
        if: always()
        run: |
          mkdir -p crash-reports
          shopt -s nullglob
          cores=(/var/lib/polyregion-cores/core.*)
          if [ ${#cores[@]} -gt 0 ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq gdb || true
            for c in "${cores[@]:0:20}"; do
              gdb -batch -ex 'thread apply all bt' -c "$c" > "crash-reports/$(basename "$c").txt" 2>&1 || true
            done
          fi
          ls -la crash-reports || true
      - name: Upload crash reports
        if: ${{ always() && !env.ACT }}
        uses: *upload
        with:
          name: crash-reports-misc-linux-${{ matrix.arch }}-Release
          path: crash-reports/
          if-no-files-found: ignore

  test-native-with-emulators:
    needs: [build, build-emulators, discover-shards]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        shard: ${{ fromJSON(needs.discover-shards.outputs.shards) }}
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: *checkout
      - *setup-just
      - *apt-cmake

      - name: Download dist
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download test dist
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-tests-emulators-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Download emulators
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-emulators-linux-${{ matrix.arch }}
          path: ./emulators

      - name: Unpack emulators
        if: ${{ !env.ACT }}
        run: tar xzf emulators/emulators-out.tar.gz -C emulators

      - *restore-exec

      - name: Enable core dumps
        run: |
          sudo mkdir -p /var/lib/polyregion-cores && sudo chmod 1777 /var/lib/polyregion-cores || true
          echo '/var/lib/polyregion-cores/core.%e.%p' | sudo tee /proc/sys/kernel/core_pattern || true

      - name: Run emulator tests (${{ matrix.shard }})
        run: |
          ulimit -c unlimited || true
          just test-native-dist emulators emulator-test-results-${{ matrix.shard }} -L "^${{ matrix.shard }}$" --no-tests=error

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/emulator-test-results-${{ matrix.shard }}.xml
          label: ctest-emulators-${{ matrix.shard }}

      - name: Upload test results
        if: ${{ always() && !env.ACT }}
        uses: *upload
        with:
          name: emulator-test-results-linux-${{ matrix.arch }}-${{ matrix.shard }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/emulator-test-results-${{ matrix.shard }}.xml
          if-no-files-found: warn

      - name: Collect crash backtraces
        if: failure()
        run: |
          mkdir -p crash-reports
          shopt -s nullglob
          cores=(/var/lib/polyregion-cores/core.*)
          if [ ${#cores[@]} -gt 0 ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq gdb || true
            for c in "${cores[@]:0:20}"; do
              gdb -batch -ex 'thread apply all bt' -c "$c" > "crash-reports/$(basename "$c").txt" 2>&1 || true
            done
          fi
          ls -la crash-reports || true

      - name: Upload crash reports
        if: ${{ failure() && !env.ACT }}
        uses: *upload
        with:
          name: crash-reports-linux-${{ matrix.arch }}-${{ matrix.shard }}-Release
          path: crash-reports/
          if-no-files-found: ignore

  check-miniapps:
    needs: [build, build-emulators]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - *setup-just
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git g++ libtbb-dev

      - name: Download dist
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download emulators
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-emulators-linux-${{ matrix.arch }}
          path: ./emulators

      - name: Unpack emulators
        if: ${{ !env.ACT }}
        run: tar xzf emulators/emulators-out.tar.gz -C emulators

      - *restore-exec

      - name: Run mini-app matrix (dist + emulators)
        env:
          POLYREGION_EMULATORS_HOME: ${{ github.workspace }}/emulators/out
        run: just check-miniapps

  test-scala:
    needs: build
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - *setup-java
      - *setup-sbt
      - *setup-just

      - name: Download dist
        if: ${{ !env.ACT }}
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Run munit suite
        env:
          POLYREGION_NATIVE_LIB_DIR: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib
          POLYPASS_PLUGINS: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib/libpolypass.so
        run: just test-scala

      - name: Annotate scala results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: frontend/compiler-testsuite-scala/target/test-reports
          label: scala

      - name: Upload test results
        if: ${{ always() && !env.ACT }}
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: scala-test-results-linux-${{ matrix.arch }}-Release
          path: ./frontend/compiler-testsuite-scala/target/test-reports/
          if-no-files-found: warn

  build-san:
    needs: build
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: &san-matrix
          - arch: x86_64
            runs_on: ubuntu-24.04
            triple: x86_64-unknown-linux-gnu
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
            triple: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
      POLYREGION_ASAN: "ON"
      ASAN_OPTIONS: detect_leaks=0
      LD_LIBRARY_PATH: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist/lib/${{ matrix.triple }}
    steps:
      - *free-disk

      - uses: *checkout

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-tools lld llvm g++ libcrypt-dev libltdl-dev zlib1g-dev python3-requests ccache

      - *setup-java

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - *setup-just

      - name: Restore sysroot cache
        if: ${{ !env.ACT }}
        uses: *cache-restore
        with:
          path: *sysroot-path
          key: *sysroot-key

      - name: Prepare sysroot
        run: |
          just prepare-sysroot
          echo "SYSROOT_PATH=$PWD/sysroot/out/${{ matrix.arch }}" >> "$GITHUB_ENV"

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        uses: *cache-restore
        with:
          path: *llvm-path
          key: *llvm-key

      - name: Restore device libs cache
        if: ${{ !env.ACT }}
        uses: *cache-restore
        with:
          path: *devlibs-path
          key: *devlibs-key

      - name: Restore vcpkg cache
        if: ${{ !env.ACT }}
        uses: *cache-restore
        with:
          path: *vcpkg-path
          key: *vcpkg-key

      - name: Download dist (pass bundle)
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release
          path: ./dist-regular

      - name: Stage pass bundle
        run: |
          if [ -f dist-regular/lib/libpolypass.so ]; then install -m755 dist-regular/lib/libpolypass.so native/polyc/libpolypass.so; fi
          test -s native/polyc/libpolypass.so

      - name: Seed asan dist from LLVM dist
        run: |
          SRC=native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist
          DST=native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist
          if [ ! -x "$DST/bin/clang++" ]; then
            rm -rf "$DST"; mkdir -p "$DST"
            cp -a "$SRC/." "$DST"
          fi

      - name: Configure (asan)
        run: just configure-san

      - name: Build dist (asan)
        run: just build-dist-san

      - name: Build test dist (asan)
        run: just build-test-dist-san

      - name: Upload dist (asan)
        if: ${{ !env.ACT }}
        uses: *upload
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist/**
          if-no-files-found: error

      - name: Upload test dist (asan)
        if: ${{ !env.ACT }}
        uses: *upload
        with:
          name: polyregion-tests-linux-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist/**
          if-no-files-found: error

  test-native-san:
    needs: build-san
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *san-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - *setup-just
      - *apt-cmake

      - name: Download dist (asan)
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-linux-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist

      - name: Download test dist (asan)
        if: ${{ !env.ACT }}
        uses: *download
        with:
          name: polyregion-tests-linux-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist

      - name: Restore executable bits
        run: just restore-exec-bits native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist

      - name: Run native tests (asan)
        run: just test-native-dist asan native-test-results-asan

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist/native-test-results-asan.xml
          label: ctest-asan

      - name: Upload test results
        if: ${{ always() && !env.ACT }}
        uses: *upload
        with:
          name: native-test-results-linux-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist/native-test-results-asan.xml
          if-no-files-found: warn
