name: Linux builds

on:
  pull_request:
  push:
  release:
    types: published

jobs:
  x86_64-release:
    uses: ./.github/workflows/linux-shared.yaml
    secrets: inherit
    with:
      build_sysroot_name: amd64
      build_arch: x86_64
      build_type: Release
      build_runs_on: ubuntu-24.04
      check_runs_on: ubuntu-24.04
      llvm_parallel_compile_jobs: "4"
      llvm_parallel_link_jobs: "2"
      flang_parallel_compile_jobs: "3"
  aarch64-release:
    uses: ./.github/workflows/linux-shared.yaml
    secrets: inherit
    with:
      build_sysroot_name: arm64
      build_arch: aarch64
      build_type: Release
      build_runs_on: ubuntu-24.04-arm
      check_runs_on: ubuntu-24.04-arm
      llvm_parallel_compile_jobs: "4"
      llvm_parallel_link_jobs: "4"
      flang_parallel_compile_jobs: "3"
