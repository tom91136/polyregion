name: macOS builds

on:
  workflow_call:
    inputs:
      build_arch:
        required: true
        type: string
      build_type:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ${{ inputs.build_arch == 'x86_64' && 'macos-26-intel' || 'macos-26' }}
    env:
      # Flang TUs need ~5-6 GB each
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: "2"
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install llvm lld cmake ninja zlib
          echo "JAVA_HOME=$(/usr/libexec/java_home)" >> $GITHUB_ENV
          echo "$(brew --prefix llvm)/bin"          >> $GITHUB_PATH

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=LLVM -P build.cmake

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        id: save-llvm
        with:
          path: ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Configure release build
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CONFIGURE -P build.cmake

      - name: Build dist
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST -P build.cmake

      - name: Package dist
        working-directory: ./native
        run: tar -cJf polyregion-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}.tar.xz -C polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist .

      - name: Check artefact
        working-directory: ./native
        if: always()
        run: |
          DIST=polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          ls -lah "$DIST/bin" "$DIST/lib"
          inspect () {
            local f="$1"
            if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
            file "$f"
            otool -L "$f"
            echo "----"
          }
          for b in polyc polycpp polyfc clang++ flang-new; do
            inspect "$DIST/bin/$b"
          done
          for l in "$DIST"/lib/libpolyc-JNI.dylib "$DIST"/lib/libpolyc-JNIshim.dylib "$DIST"/lib/libpolyinvoke-JNI.dylib; do
            inspect "$l"
          done

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}.tar.xz
          if-no-files-found: error

  dist-check:
    needs: build
    runs-on: ${{ inputs.build_arch == 'x86_64' && 'macos-26-intel' || 'macos-26' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        # XXX tbb is needed for the polycpp-offload dist-check
        run: brew install cmake tbb

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: polyregion-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native

      - name: Extract dist
        working-directory: ./native
        run: |
          mkdir -p polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          tar -xJf polyregion-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}.tar.xz -C polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist

      - name: Run dist-check
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CHECK -P build.cmake
