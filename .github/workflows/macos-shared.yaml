name: macOS builds (dummy)

on:
  workflow_call:
    inputs:
      build_arch:
        required: true
        type: string
      build_type:
        required: true
        type: string
      build_runs_on:
        required: true
        type: string
      check_runs_on:
        required: true
        type: string
      llvm_parallel_compile_jobs:
        required: true
        type: string
      llvm_parallel_link_jobs:
        required: true
        type: string
      flang_parallel_compile_jobs:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ${{ inputs.build_runs_on }}
    env:
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ inputs.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ inputs.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ inputs.flang_parallel_compile_jobs }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        # gcc brings gfortran which flang-rt needs at LLVM-runtimes configure time.
        run: |
          brew install --quiet llvm lld cmake ninja zlib gcc
          echo "JAVA_HOME=$(/usr/libexec/java_home)" >> $GITHUB_ENV
          echo "$(brew --prefix llvm)/bin"          >> $GITHUB_PATH

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: |
            ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
            ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=LLVM -P build.cmake

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        id: save-llvm
        with:
          path: |
            ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
            ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Configure release build
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CONFIGURE -P build.cmake

      - name: Build dist
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST -P build.cmake

      - name: Build test dist
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST_TEST -P build.cmake

      - name: Check artefact
        working-directory: ./native
        if: always()
        run: |
          DIST=polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          ls -lah "$DIST/bin" "$DIST/lib"
          inspect () {
            local f="$1"
            if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
            file "$f"
            otool -L "$f"
            echo "----"
          }
          for b in polyc polycpp polyfc clang++ flang-new; do
            inspect "$DIST/bin/$b"
          done
          for l in "$DIST"/lib/libpolyc-JNI.dylib "$DIST"/lib/libpolyc-JNIshim.dylib "$DIST"/lib/libpolyinvoke-JNI.dylib; do
            inspect "$l"
          done

      - name: Upload dist
        uses: actions/upload-artifact@v5
        with:
          name: polyregion-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Upload test dist
        uses: actions/upload-artifact@v5
        with:
          name: polyregion-tests-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist/**
          if-no-files-found: error

  dist-check:
    needs: build
    runs-on: ${{ inputs.check_runs_on }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: brew install --quiet cmake

      - name: Download dist
        uses: actions/download-artifact@v5
        with:
          name: polyregion-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          DIST=polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          find "$DIST/bin" -type f -exec chmod +x {} +
          find "$DIST/lib" -type f -name '*.dylib' -exec chmod +x {} +

      - name: Run dist-check
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CHECK -P build.cmake

  unit-tests:
    needs: build
    runs-on: ${{ inputs.check_runs_on }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: brew install --quiet cmake

      - name: Download dist
        uses: actions/download-artifact@v5
        with:
          name: polyregion-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist

      - name: Download test dist
        uses: actions/download-artifact@v5
        with:
          name: polyregion-tests-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          for d in polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist; do
            if [[ -d "$d/bin" ]]; then find "$d/bin" -type f -exec chmod +x {} +; fi
            if [[ -d "$d/lib" ]]; then find "$d/lib" -type f -name '*.dylib' -exec chmod +x {} +; fi
          done

      - name: Run unit tests
        working-directory: ./native
        run: |
          DIST=$PWD/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          TESTS=$PWD/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          export DYLD_FALLBACK_LIBRARY_PATH=$DIST/lib:${DYLD_FALLBACK_LIBRARY_PATH:-$HOME/lib:/usr/local/lib:/usr/lib}
          export POLYREGION_BITCODE_DIR=$DIST/lib
          export POLYTEST_CLANG_DRIVER=$DIST/bin/clang++
          export POLYTEST_FLANG_DRIVER=$DIST/bin/flang-new
          ctest --test-dir "$TESTS" -LE device --output-on-failure --output-junit "$TESTS/unit-test-results.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-results-darwin-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist/unit-test-results.xml
          if-no-files-found: warn
