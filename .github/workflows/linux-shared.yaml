name: Linux builds (dummy)

on:
  workflow_call:
    inputs:
      build_sysroot_name:
        required: true
        type: string
      build_arch:
        required: true
        type: string
      build_type:
        required: true
        type: string
      build_runs_on:
        required: true
        type: string
      check_runs_on:
        required: true
        type: string
      llvm_parallel_compile_jobs:
        required: true
        type: string
      llvm_parallel_link_jobs:
        required: true
        type: string
      flang_parallel_compile_jobs:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ${{ inputs.build_runs_on }}
    env:
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ inputs.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ inputs.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ inputs.flang_parallel_compile_jobs }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        # llvm-tblgen is in llvm; gfortran is needed at LLVM-runtimes configure time so
        # flang-rt's enable_language(Fortran) succeeds.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang lld llvm gfortran libcrypt-dev libltdl-dev zlib1g-dev python3-requests default-jdk

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - name: Restore sysroot cache
        if: ${{ !env.ACT }}
        id: restore-sysroot
        uses: actions/cache/restore@v5
        with:
          path: ./native/debian-sysroot-image-creator/out/sysroot-build/bullseye/debian_bullseye_${{ inputs.build_sysroot_name }}_sysroot.tar.xz
          key: sysroot-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/make_sysroot.py') }}

      - name: Build sysroot
        id: build-sysroot
        if: steps.restore-sysroot.outputs.cache-hit != 'true'
        working-directory: ./native
        run: ./make_sysroot.py build ${{ inputs.build_sysroot_name }}

      - name: Save sysroot cache
        if: steps.build-sysroot.outcome == 'success'
        uses: actions/cache/save@v5
        id: save-sysroot
        with:
          path: ./native/debian-sysroot-image-creator/out/sysroot-build/bullseye/debian_bullseye_${{ inputs.build_sysroot_name }}_sysroot.tar.xz
          key: sysroot-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/make_sysroot.py') }}

      - name: Prepare sysroot
        working-directory: ./native/debian-sysroot-image-creator
        run: |
          mkdir -p "sysroot_${{ inputs.build_sysroot_name }}"
          tar xf out/sysroot-build/bullseye/debian_bullseye_${{ inputs.build_sysroot_name }}_sysroot.tar.xz  -C ./sysroot_${{ inputs.build_sysroot_name }}
          echo "SYSROOT_PATH=$PWD/sysroot_${{ inputs.build_sysroot_name }}" >> $GITHUB_ENV

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: |
            ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=LLVM -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        id: save-llvm
        with:
          path: |
            ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Restore device libs cache
        if: ${{ !env.ACT }}
        id: restore-device-libs
        uses: actions/cache/restore@v5
        with:
          path: ./native/thirdparty/device_libs
          key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build device libs
        id: build-device-libs
        if: steps.restore-device-libs.outputs.cache-hit != 'true'
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DEVICE_LIBS -P build.cmake

      - name: Save device libs cache
        if: steps.build-device-libs.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: ./native/thirdparty/device_libs
          key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Configure release build
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CONFIGURE -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Build dist
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Build test dist
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST_TEST -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Check artefact
        working-directory: ./native
        if: always()
        run: |
          DIST=polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          ls -lah "$DIST/bin" "$DIST/lib"
          inspect () {
            local f="$1"
            if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
            file "$f"
            objdump -p "$f" | grep -E '^\s+NEEDED' || true
            echo "----"
          }
          for b in polyc polycpp polyfc clang++ flang-new; do
            inspect "$DIST/bin/$b"
          done
          for l in "$DIST"/lib/libpolyc-JNI.so "$DIST"/lib/libpolyc-JNIshim.so "$DIST"/lib/libpolyinvoke-JNI.so; do
            inspect "$l"
          done

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: polyregion-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Upload test dist
        uses: actions/upload-artifact@v7
        with:
          name: polyregion-tests-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist/**
          if-no-files-found: error

  dist-check:
    needs: build
    runs-on: ${{ inputs.check_runs_on }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: polyregion-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          DIST=polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          find "$DIST/bin" -type f -exec chmod +x {} +
          find "$DIST/lib" -type f -name '*.so' -exec chmod +x {} +

      - name: Run dist-check
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CHECK -P build.cmake

  unit-tests:
    needs: build
    runs-on: ${{ inputs.check_runs_on }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: polyregion-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist

      - name: Download test dist
        uses: actions/download-artifact@v8
        with:
          name: polyregion-tests-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          for d in polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist; do
            if [[ -d "$d/bin" ]]; then find "$d/bin" -type f -exec chmod +x {} +; fi
            if [[ -d "$d/lib" ]]; then find "$d/lib" -type f -name '*.so' -exec chmod +x {} +; fi
          done

      - name: Run unit tests
        working-directory: ./native
        run: |
          DIST=$PWD/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          TESTS=$PWD/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          export PATH=$DIST/bin:$PATH
          export LD_LIBRARY_PATH=$DIST/lib:${LD_LIBRARY_PATH:-}
          export POLYREGION_BITCODE_DIR=$DIST/lib
          export POLYTEST_CLANG_DRIVER=$DIST/bin/clang++
          export POLYTEST_FLANG_DRIVER=$DIST/bin/flang-new
          ctest --test-dir "$TESTS" -LE device --output-on-failure --output-junit "$TESTS/unit-test-results.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist/unit-test-results.xml
          if-no-files-found: warn
