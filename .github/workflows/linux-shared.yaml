name: Linux build

on:
  workflow_call:
    inputs:
      build_sysroot_name:
        required: true
        type: string
      build_arch:
        required: true
        type: string
      build_type:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ${{ inputs.build_arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    env:
      # Flang TUs need ~5-6 GB each
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: "3"
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        # llvm-tblgen is in llvm; gfortran is needed at LLVM-runtimes configure time so
        # flang-rt's enable_language(Fortran) succeeds.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang lld llvm gfortran libcrypt-dev libltdl-dev zlib1g-dev python3-requests default-jdk

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - name: Restore sysroot cache
        if: ${{ !env.ACT }}
        id: restore-sysroot
        uses: actions/cache/restore@v5
        with:
          path: ./native/debian-sysroot-image-creator/out/sysroot-build/bullseye/debian_bullseye_${{ inputs.build_sysroot_name }}_sysroot.tar.xz
          key: sysroot-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/make_sysroot.py') }}

      - name: Build sysroot
        id: build-sysroot
        if: steps.restore-sysroot.outputs.cache-hit != 'true'
        working-directory: ./native
        run: ./make_sysroot.py build ${{ inputs.build_sysroot_name }}

      - name: Save sysroot cache
        if: steps.build-sysroot.outcome == 'success'
        uses: actions/cache/save@v5
        id: save-sysroot
        with:
          path: ./native/debian-sysroot-image-creator/out/sysroot-build/bullseye/debian_bullseye_${{ inputs.build_sysroot_name }}_sysroot.tar.xz
          key: sysroot-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/make_sysroot.py') }}

      - name: Prepare sysroot
        working-directory: ./native/debian-sysroot-image-creator
        run: |
          mkdir -p "sysroot_${{ inputs.build_sysroot_name }}"
          tar xf out/sysroot-build/bullseye/debian_bullseye_${{ inputs.build_sysroot_name }}_sysroot.tar.xz  -C ./sysroot_${{ inputs.build_sysroot_name }}
          echo "SYSROOT_PATH=$PWD/sysroot_${{ inputs.build_sysroot_name }}" >> $GITHUB_ENV

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=LLVM -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        id: save-llvm
        with:
          path: ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Configure release build
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CONFIGURE -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Build dist
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST -DCMAKE_SYSROOT=${{ env.SYSROOT_PATH }} -P build.cmake

      - name: Package dist
        working-directory: ./native
        run: tar -cJf polyregion-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}.tar.xz -C polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist .

      - name: Check artefact
        working-directory: ./native
        if: always()
        run: |
          DIST=polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          ls -lah "$DIST/bin" "$DIST/lib"
          inspect () {
            local f="$1"
            if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
            file "$f"
            objdump -p "$f" | grep -E '^\s+NEEDED' || true
            echo "----"
          }
          for b in polyc polycpp polyfc clang++ flang-new; do
            inspect "$DIST/bin/$b"
          done
          for l in "$DIST"/lib/libpolyc-JNI.so "$DIST"/lib/libpolyc-JNIshim.so "$DIST"/lib/libpolyinvoke-JNI.so; do
            inspect "$l"
          done

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}.tar.xz
          if-no-files-found: error

  dist-check:
    needs: build
    runs-on: ${{ inputs.build_arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        # XXX tbb is needed for the polycpp-offload dist-check
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libtbb-dev

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: polyregion-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native

      - name: Extract dist
        working-directory: ./native
        run: |
          mkdir -p polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist
          tar -xJf polyregion-linux-${{ inputs.build_arch }}-${{ inputs.build_type }}.tar.xz -C polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist

      - name: Run dist-check
        working-directory: ./native
        run: cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CHECK -P build.cmake
