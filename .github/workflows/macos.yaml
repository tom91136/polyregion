name: macOS builds

on:
  pull_request:
  push:
  release:
    types: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pass-js:
    runs-on: macos-26
    steps:
      - uses: &checkout actions/checkout@v6

      - &setup-java
        name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - &setup-sbt
        name: Setup sbt
        uses: sbt/setup-sbt@v1

      - &setup-just
        name: Setup just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build pass bundle (js)
        run: just build-pass-js

      - name: Verify bundle staged
        run: |
          test -s native/polyc/polypass.js
          echo "polypass.js size: $(wc -c < native/polyc/polypass.js) bytes"

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-26
            llvm_parallel_compile_jobs: "3"
            llvm_parallel_link_jobs: "3"
            flang_parallel_compile_jobs: "1"
          - arch: x86_64
            runs_on: macos-26
            llvm_parallel_compile_jobs: "3"
            llvm_parallel_link_jobs: "3"
            flang_parallel_compile_jobs: "1"
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ matrix.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ matrix.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ matrix.flang_parallel_compile_jobs }}
      POLYC_PASS_BUNDLE: dso
    steps:
      - uses: *checkout

      - name: Install dependencies
        # gcc brings gfortran which flang-rt needs at LLVM-runtimes configure time.
        run: |
          brew install --quiet llvm lld cmake ninja zlib gcc sbt
          echo "JAVA_HOME=$(/usr/libexec/java_home)" >> $GITHUB_ENV
          echo "$(brew --prefix llvm)/bin"          >> $GITHUB_PATH

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: &cache-restore actions/cache/restore@v5
        with:
          path: &llvm-path |
            ./native/out/polyregion-Release-${{ matrix.arch }}-*-dist
          key: &llvm-key llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/llvm-patches/*.patch', './native/llvm-patches-*/*.patch') }}

      - *setup-just

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        run: just build-llvm

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: &cache-save actions/cache/save@v5
        with:
          path: *llvm-path
          key: *llvm-key

      - name: Restore device libs cache
        if: ${{ !env.ACT }}
        id: restore-device-libs
        uses: *cache-restore
        with:
          path: &devlibs-path ./native/thirdparty/device_libs
          key: &devlibs-key device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/llvm-patches/*.patch', './native/llvm-patches-*/*.patch') }}

      - name: Build device libs
        id: build-device-libs
        if: steps.restore-device-libs.outputs.cache-hit != 'true'
        run: just build-device-libs

      - name: Save device libs cache
        if: steps.build-device-libs.outcome == 'success'
        uses: *cache-save
        with:
          path: *devlibs-path
          key: *devlibs-key

      - name: Restore vcpkg cache
        if: ${{ !env.ACT }}
        id: restore-vcpkg
        uses: *cache-restore
        with:
          path: &vcpkg-path ./native/.vcpkg/vcpkg_installed
          key: &vcpkg-key vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/vcpkg.json', './native/vcpkg-configuration.json', './native/toolchains/*.cmake', './native/.env') }}

      - name: Install vcpkg dependencies
        id: build-vcpkg
        if: steps.restore-vcpkg.outputs.cache-hit != 'true'
        run: just build-vcpkg-deps

      - name: Save vcpkg cache
        if: steps.build-vcpkg.outcome == 'success'
        uses: *cache-save
        with:
          path: *vcpkg-path
          key: *vcpkg-key

      - name: Build pass bundle (dso)
        run: just build-pass-native

      - name: Configure release build
        run: just configure

      - name: Build dist
        run: just build-dist

      - name: Build test dist
        run: just build-test-dist

      - name: Check artefact
        if: always()
        run: just check-dist-deps native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Upload dist
        # v4: nektos/act#6022
        uses: &upload actions/upload-artifact@v7
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Upload test dist
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: polyregion-tests-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Build test dist (emulators profile)
        env:
          POLYREGION_TEST_PROFILE: emulators
        run: |
          find native/out -path '*/polytest-discover/*.ids' -delete
          just build-test-dist

      - name: Upload test dist (emulators)
        uses: *upload
        with:
          name: polyregion-tests-emulators-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: List shards
        run: just list-shards emulators > shards.txt

      - name: Upload shards
        uses: *upload
        with:
          name: polyregion-shards-darwin-${{ matrix.arch }}
          path: shards.txt
          if-no-files-found: error

  check-dist:
    needs: build
    # Run for whichever arch built; the leg whose build failed has no artifact and goes red on download.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: &simple-matrix
          - arch: arm64
            runs_on: macos-26
          - arch: x86_64
            runs_on: macos-26-intel
    runs-on: ${{ matrix.runs_on }}
    env: &arch-env
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: *checkout

      - &brew-cmake
        name: Install dependencies
        run: brew install --quiet cmake

      - *setup-just

      - name: Download dist
        # v4: nektos/act#6022
        uses: &download actions/download-artifact@v8
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        run: just restore-exec-bits native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Run check-dist
        run: just check-dist

      - name: Annotate dist-check results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/build-dist-check-${{ matrix.arch }}-dylib/dist-check-results.xml
          label: dist-check

  discover-shards:
    needs: build
    runs-on: ubuntu-24.04
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - name: Download shards
        uses: *download
        with:
          name: polyregion-shards-darwin-arm64
          path: .
      - id: gen
        name: Build shard matrix
        run: |
          shards=$(jq -R -s -c '[split("\n")[] | select(length > 0)]' shards.txt)
          echo "shards=$shards" >> "$GITHUB_OUTPUT"
          echo "shards: $shards"

  test-native-misc:
    needs: [build, build-emulators]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - *setup-just
      - *brew-cmake

      - name: Download dist
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download test dist (emulators)
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-tests-emulators-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Download emulators
        uses: *download
        with:
          name: polyregion-emulators-darwin-${{ matrix.arch }}
          path: ./emulators

      - name: Unpack emulators
        run: tar xzf emulators/emulators-out.tar.gz -C emulators

      - name: Restore executable bits
        run: just restore-exec-bits native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Run misc tests (non-codegen)
        run: just test-native-dist emulators misc-test-results -LE codegen

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/misc-test-results.xml
          label: ctest-misc

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: misc-test-results-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/misc-test-results.xml
          if-no-files-found: warn

  test-scala:
    needs: build
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - *setup-java
      - *setup-sbt
      - *setup-just

      - name: Download dist
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Run munit suite
        env:
          POLYREGION_NATIVE_LIB_DIR: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib
          DYLD_FALLBACK_LIBRARY_PATH: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib
          POLYPASS_PLUGINS: ${{ github.workspace }}/native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib/libpolypass.dylib
        run: just test-scala

      - name: Annotate scala results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: frontend/compiler-testsuite-scala/target/test-reports
          label: scala

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: scala-test-results-darwin-${{ matrix.arch }}-Release
          path: ./frontend/compiler-testsuite-scala/target/test-reports/
          if-no-files-found: warn

  build-san:
    needs: build
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-26
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
      POLYREGION_ASAN: "ON"
      ASAN_OPTIONS: detect_leaks=0
    steps:
      - uses: *checkout

      - name: Install dependencies
        run: |
          brew install --quiet cmake ninja zlib
          echo "JAVA_HOME=$(/usr/libexec/java_home)" >> $GITHUB_ENV

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - *setup-just

      - name: Restore LLVM cache
        uses: *cache-restore
        with:
          path: *llvm-path
          key: *llvm-key

      - name: Restore device libs cache
        uses: *cache-restore
        with:
          path: *devlibs-path
          key: *devlibs-key

      - name: Restore vcpkg cache
        uses: *cache-restore
        with:
          path: *vcpkg-path
          key: *vcpkg-key

      - name: Download dist (pass bundle)
        uses: *download
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./dist-regular

      - name: Stage pass bundle
        run: |
          if [ -f dist-regular/lib/libpolypass.dylib ]; then install -m755 dist-regular/lib/libpolypass.dylib native/polyc/libpolypass.dylib; fi
          test -s native/polyc/libpolypass.dylib

      - name: Seed asan dist from LLVM dist
        run: |
          SRC=native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist
          DST=native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist
          if [ ! -x "$DST/bin/clang++" ]; then
            rm -rf "$DST"; mkdir -p "$DST"
            cp -a "$SRC/." "$DST"
          fi

      - name: Configure (asan)
        run: just configure-san

      - name: Build dist (asan)
        run: just build-dist-san

      - name: Build test dist (asan)
        run: just build-test-dist-san

      - name: Upload dist (asan)
        uses: *upload
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist/**
          if-no-files-found: error

      - name: Upload test dist (asan)
        uses: *upload
        with:
          name: polyregion-tests-darwin-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist/**
          if-no-files-found: error

  test-native-san:
    needs: build-san
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-26
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - *setup-just
      - *brew-cmake

      - name: Download dist (asan)
        uses: *download
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist

      - name: Download test dist (asan)
        uses: *download
        with:
          name: polyregion-tests-darwin-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist

      - name: Restore executable bits
        run: just restore-exec-bits native/out/polyregion-Release-${{ matrix.arch }}-dylib-asan-dist native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist

      - name: Run native tests (asan)
        run: just test-native-dist asan native-test-results-asan

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist/native-test-results-asan.xml
          label: ctest-asan

      - name: Upload test results
        if: always()
        uses: *upload
        with:
          name: native-test-results-darwin-${{ matrix.arch }}-Release-asan
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-asan-dist/native-test-results-asan.xml
          if-no-files-found: warn

  build-emulators:
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: *checkout
      - *setup-just
      - name: Restore emulators cache
        if: ${{ !env.ACT }}
        id: restore-emu
        uses: *cache-restore
        with:
          path: &emu-path ./emulators/out
          key: &emu-key emulators-darwin-${{ matrix.arch }}-${{ hashFiles('./emulators/macos.sh') }}
      - name: Build emulators
        id: build-emulators
        if: steps.restore-emu.outputs.cache-hit != 'true'
        run: just build-emulators
      - name: Save emulators cache
        if: steps.build-emulators.outcome == 'success'
        uses: *cache-save
        with:
          path: *emu-path
          key: *emu-key
      - name: Pack emulators (tar preserves symlinks)
        run: tar czf emulators-out.tar.gz -C emulators out
      - name: Upload emulators artifact
        uses: *upload
        with:
          name: polyregion-emulators-darwin-${{ matrix.arch }}
          path: emulators-out.tar.gz
          if-no-files-found: error

  test-native-with-emulators:
    needs: [build, build-emulators, discover-shards]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        shard: ${{ fromJSON(needs.discover-shards.outputs.shards) }}
    runs-on: ${{ matrix.arch == 'x86_64' && 'macos-26-intel' || 'macos-26' }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: *checkout
      - *setup-just
      - *brew-cmake

      - name: Download dist
        uses: *download
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download test dist (emulators)
        uses: *download
        with:
          name: polyregion-tests-emulators-darwin-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Download emulators
        uses: *download
        with:
          name: polyregion-emulators-darwin-${{ matrix.arch }}
          path: ./emulators

      - name: Unpack emulators
        run: tar xzf emulators/emulators-out.tar.gz -C emulators

      - name: Restore executable bits
        run: just restore-exec-bits native/out/polyregion-Release-${{ matrix.arch }}-dylib-dist native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Run emulator tests (${{ matrix.shard }})
        run: just test-native-dist emulators emulator-test-results-${{ matrix.shard }} -L "^${{ matrix.shard }}$" --no-tests=error

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/emulator-test-results-${{ matrix.shard }}.xml
          label: ctest-emulators-${{ matrix.shard }}

      - name: Upload test results
        if: always()
        uses: *upload
        with:
          name: emulator-test-results-darwin-${{ matrix.arch }}-${{ matrix.shard }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/emulator-test-results-${{ matrix.shard }}.xml
          if-no-files-found: warn
