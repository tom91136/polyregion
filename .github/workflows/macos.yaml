name: macOS builds

on:
  pull_request:
  push:
  release:
    types: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pass-js:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Build pass bundle (js)
        run: just pass-js

      - name: Verify bundle staged
        run: |
          test -s native/polyc/polypass.js
          echo "polypass.js size: $(wc -c < native/polyc/polypass.js) bytes"

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-26
            llvm_parallel_compile_jobs: "3"
            llvm_parallel_link_jobs: "3"
            flang_parallel_compile_jobs: "1"
          - arch: x86_64
            runs_on: macos-26
            llvm_parallel_compile_jobs: "3"
            llvm_parallel_link_jobs: "3"
            flang_parallel_compile_jobs: "1"
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ matrix.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ matrix.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ matrix.flang_parallel_compile_jobs }}
      POLYC_PASS_BUNDLE: dso
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        # gcc brings gfortran which flang-rt needs at LLVM-runtimes configure time.
        run: |
          brew install --quiet llvm lld cmake ninja zlib gcc sbt
          echo "JAVA_HOME=$(/usr/libexec/java_home)" >> $GITHUB_ENV
          echo "$(brew --prefix llvm)/bin"          >> $GITHUB_PATH

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        run: |
          clang --version
          llvm-tblgen --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "VCPKG_ROOT=$VCPKG_ROOT"

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: |
            ./native/polyregion-Release-${{ matrix.arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        run: just llvm

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: |
            ./native/polyregion-Release-${{ matrix.arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Restore device libs cache
        if: ${{ !env.ACT }}
        id: restore-device-libs
        uses: actions/cache/restore@v5
        with:
          path: |
            ./native/thirdparty/device_libs
            !./native/thirdparty/device_libs/.staging
          key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build device libs
        id: build-device-libs
        if: steps.restore-device-libs.outputs.cache-hit != 'true'
        run: just device-libs

      - name: Save device libs cache
        if: steps.build-device-libs.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: |
            ./native/thirdparty/device_libs
            !./native/thirdparty/device_libs/.staging
          key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Install vcpkg dependencies
        run: just vcpkg-deps

      - name: Build pass bundle (dso)
        run: just pass-native

      - name: Configure release build
        run: just configure

      - name: Build dist
        run: just dist

      - name: Build test dist
        run: just test-dist

      - name: Check artefact
        if: always()
        working-directory: ./native
        run: |
          DIST=polyregion-Release-${{ matrix.arch }}-dylib-dist
          ls -lah "$DIST/bin" "$DIST/lib"
          inspect () {
            local f="$1"
            if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
            file "$f"
            otool -L "$f"
            echo "----"
          }
          for b in polyc polycpp polyfc clang++ flang-new; do
            inspect "$DIST/bin/$b"
          done
          for l in "$DIST"/lib/libpolyc-JNI.dylib "$DIST"/lib/libpolyc-JNIshim.dylib "$DIST"/lib/libpolyinvoke-JNI.dylib; do
            inspect "$l"
          done

      - name: Upload dist
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

      - name: Upload test dist
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-tests-darwin-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/**
          if-no-files-found: error

  dist-check:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-26
          - arch: x86_64
            runs_on: macos-26-intel
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install --quiet cmake

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          DIST=polyregion-Release-${{ matrix.arch }}-dylib-dist
          find "$DIST/bin" -type f -exec chmod +x {} +
          find "$DIST/lib" -type f -name '*.dylib' -exec chmod +x {} +

      - name: Run dist-check
        run: just dist-check

  native-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-26
          - arch: x86_64
            runs_on: macos-26-intel
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install --quiet cmake

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Download test dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-tests-darwin-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist

      - name: Restore executable bits
        working-directory: ./native
        run: |
          for d in polyregion-Release-${{ matrix.arch }}-dylib-dist polyregion-test-Release-${{ matrix.arch }}-dylib-dist; do
            if [[ -d "$d/bin" ]]; then find "$d/bin" -type f -exec chmod +x {} +; fi
            if [[ -d "$d/lib" ]]; then find "$d/lib" -type f -name '*.dylib' -exec chmod +x {} +; fi
          done

      - name: Run native tests
        working-directory: ./native
        run: |
          DIST=$PWD/polyregion-Release-${{ matrix.arch }}-dylib-dist
          TESTS=$PWD/polyregion-test-Release-${{ matrix.arch }}-dylib-dist
          export PATH=$DIST/bin:$PATH
          export DYLD_FALLBACK_LIBRARY_PATH=$DIST/lib:${DYLD_FALLBACK_LIBRARY_PATH:-$HOME/lib:/usr/local/lib:/usr/lib}
          export POLYREGION_BITCODE_DIR=$DIST/lib
          export POLYPASS_PLUGINS=$DIST/lib/libpolypass.dylib
          export POLYTEST_CLANG_DRIVER=$DIST/bin/clang++
          export POLYTEST_FLANG_DRIVER=$DIST/bin/flang-new
          ctest --test-dir "$TESTS" -LE device --timeout 300 --output-on-failure --output-junit "$TESTS/native-test-results.xml"

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: native-test-results-darwin-${{ matrix.arch }}-Release
          path: ./native/polyregion-test-Release-${{ matrix.arch }}-dylib-dist/native-test-results.xml
          if-no-files-found: warn

  scala-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-26
          - arch: x86_64
            runs_on: macos-26-intel
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-darwin-${{ matrix.arch }}-Release
          path: ./native/polyregion-Release-${{ matrix.arch }}-dylib-dist

      - name: Stage JNI libs at Loader-searched path
        # XXX Loader.java probes ../native/cmake-build-release-clang/bindings/jvm/ etc. from sbt's
        # frontend/ cwd; the CI dist puts the JNI .dylibs under lib/. Bridge via copy.
        run: |
          DIST=./native/polyregion-Release-${{ matrix.arch }}-dylib-dist
          mkdir -p native/cmake-build-release-clang/bindings/jvm
          for f in libpolyc-JNI.dylib libpolyc-JNIshim.dylib libpolyinvoke-JNI.dylib; do
            chmod +x "$DIST/lib/$f" || true
            cp "$DIST/lib/$f" native/cmake-build-release-clang/bindings/jvm/
          done

      - name: Run munit suite
        env:
          DYLD_FALLBACK_LIBRARY_PATH: ${{ github.workspace }}/native/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib
          POLYPASS_PLUGINS: ${{ github.workspace }}/native/polyregion-Release-${{ matrix.arch }}-dylib-dist/lib/libpolypass.dylib
        run: just scala-tests

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: scala-test-results-darwin-${{ matrix.arch }}-Release
          path: ./frontend/compiler-testsuite-scala/target/test-reports/
          if-no-files-found: warn
