name: macOS builds

on:
  pull_request:
  push:
  release:
    types: published

jobs:
  arm64-release:
    uses: ./.github/workflows/macos-shared.yaml
    secrets: inherit
    with:
      build_arch: arm64
      build_type: Release
      build_runs_on: macos-26
      check_runs_on: macos-26
      llvm_parallel_compile_jobs: "3"
      llvm_parallel_link_jobs: "3"
      flang_parallel_compile_jobs: "1"
  x86_64-release:
    uses: ./.github/workflows/macos-shared.yaml
    secrets: inherit
    with:
      build_arch: x86_64
      build_type: Release
      build_runs_on: macos-26
      check_runs_on: macos-26-intel
      llvm_parallel_compile_jobs: "3"
      llvm_parallel_link_jobs: "3"
      flang_parallel_compile_jobs: "1"
