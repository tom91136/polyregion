name: Windows builds

on:
  pull_request:
  push:
  release:
    types: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: cmd

jobs:
  pass-js:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Build pass bundle (js)
        run: just pass-js

      - name: Verify bundle staged
        shell: bash
        run: |
          test -s native/polyc/polypass.js
          echo "polypass.js size: $(wc -c < native/polyc/polypass.js) bytes"

  # Per-arch build jobs so downstream can proceed for the arch that built even if the other is red.
  build-amd64:
    runs-on: windows-2025-vs2026
    env:
      POLYREGION_ARCH: amd64
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: "4"
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: "2"
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: "2"
      POLYC_PASS_BUNDLE: dso
      # Hermes port doesn't compile cleanly with MSVC cl.exe (__builtin_expect missing).
      # quickjs-ng is portable C, builds on MSVC. Switch JS engine on Windows.
      POLYC_JS_ENGINE: qjs
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-windows
        with:
          arch: amd64
          act: ${{ env.ACT }}

  build-arm64:
    runs-on: windows-11-arm
    env:
      POLYREGION_ARCH: arm64
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: "4"
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: "4"
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: "2"
      POLYC_PASS_BUNDLE: dso
      POLYC_JS_ENGINE: qjs
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-windows
        with:
          arch: arm64
          act: ${{ env.ACT }}

  check-dist:
    needs: [build-amd64, build-arm64]
    # Run for whichever arch built; the leg whose build failed has no artifact and goes red on download.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: windows-2025-vs2026
          - arch: arm64
            runs_on: windows-11-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup MSVC env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-static-dist

      - name: Run check-dist
        run: just check-dist

      - name: Annotate dist-check results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/build-dist-check-${{ matrix.arch }}-static/dist-check-results.xml
          label: dist-check

  test-native:
    needs: [build-amd64, build-arm64]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: windows-2025-vs2026
          - arch: arm64
            runs_on: windows-11-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-static-dist

      - name: Setup MSVC env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Download test dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-tests-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist

      - name: Run native tests
        working-directory: ./native
        run: |
          set "DIST=%CD%\out\polyregion-Release-${{ matrix.arch }}-static-dist"
          set "TESTS=%CD%\out\polyregion-test-Release-${{ matrix.arch }}-static-dist"
          set "PATH=%DIST%\bin;%PATH%"
          set "POLYREGION_BITCODE_DIR=%DIST%\lib"
          set "POLYPASS_PLUGINS=%DIST%\lib\libpolypass.dll"
          set "POLYTEST_CLANG_DRIVER=%DIST%\bin\clang++.exe"
          set "POLYTEST_FLANG_DRIVER=%DIST%\bin\flang-new.exe"
          ctest --test-dir "%TESTS%" -LE device --timeout 300 --output-on-failure --output-junit "%TESTS%\native-test-results.xml"

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist/native-test-results.xml
          label: ctest

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: native-test-results-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist/native-test-results.xml
          if-no-files-found: warn

  test-scala:
    needs: [build-amd64, build-arm64]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: windows-2025-vs2026
          - arch: arm64
            runs_on: windows-11-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK + sbt cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.1.18

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Download dist
        # v4: nektos/act#6022
        uses: actions/download-artifact@v4
        with:
          name: polyregion-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-static-dist

      - name: Run munit suite
        env:
          POLYREGION_NATIVE_LIB_DIR: ${{ github.workspace }}\native\out\polyregion-Release-${{ matrix.arch }}-static-dist\lib
          PATH: ${{ github.workspace }}\native\out\polyregion-Release-${{ matrix.arch }}-static-dist\bin;${{ env.PATH }}
          POLYPASS_PLUGINS: ${{ github.workspace }}\native\out\polyregion-Release-${{ matrix.arch }}-static-dist\lib\libpolypass.dll
        run: just test-scala

      - name: Annotate scala results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: frontend/compiler-testsuite-scala/target/test-reports
          label: scala

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: actions/upload-artifact@v4
        with:
          name: scala-test-results-windows-${{ matrix.arch }}-Release
          path: ./frontend/compiler-testsuite-scala/target/test-reports/
          if-no-files-found: warn
