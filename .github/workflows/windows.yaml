name: Windows builds

on:
  pull_request:
  push:
  release:
    types: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: cmd

jobs:
  pass-js:
    runs-on: windows-2025-vs2026
    steps:
      - uses: &checkout actions/checkout@v6

      - &setup-java
        name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - &setup-sbt
        name: Setup sbt
        uses: sbt/setup-sbt@v1

      - &setup-just
        name: Setup just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build pass bundle (js)
        run: just build-pass-js

      - name: Verify bundle staged
        shell: bash
        run: |
          test -s native/polyc/polypass.js
          echo "polypass.js size: $(wc -c < native/polyc/polypass.js) bytes"

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: windows-2025-vs2026
            llvm_parallel_compile_jobs: "4"
            llvm_parallel_link_jobs: "2"
            flang_parallel_compile_jobs: "2"
          - arch: arm64
            runs_on: windows-11-arm
            llvm_parallel_compile_jobs: "4"
            llvm_parallel_link_jobs: "4"
            flang_parallel_compile_jobs: "2"
    runs-on: ${{ matrix.runs_on }}
    env:
      POLYREGION_ARCH: ${{ matrix.arch }}
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ matrix.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ matrix.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ matrix.flang_parallel_compile_jobs }}
      POLYC_PASS_BUNDLE: dso
      # Hermes port doesn't compile cleanly with MSVC cl.exe (__builtin_expect missing).
      # quickjs-ng is portable C, builds on MSVC. Switch JS engine on Windows.
      POLYC_JS_ENGINE: qjs
    steps:
      - uses: *checkout

      - name: Install LLVM
        # Without clang-cl the LLVM runtimes (compiler-rt builtins) fails because
        # cl.exe cannot parse GCC __attribute__ syntax used in e.g. aarch64/fp_mode.c. The
        # github-hosted runners normally ship LLVM at C:\Program Files\LLVM, but the
        # windows-11-arm runner may not, so install explicitly via winget.
        shell: pwsh
        env:
          LLVM_HOST_VERSION: "21.1.6"
        run: |
          if (-not (Get-Command clang-cl -ErrorAction SilentlyContinue)) {
            winget install --id LLVM.LLVM --version $env:LLVM_HOST_VERSION --silent --disable-interactivity --accept-source-agreements --accept-package-agreements
          }
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - *setup-java

      - *setup-sbt

      - name: Setup Ninja
        uses: taiki-e/install-action@v2
        with:
          tool: ninja

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - &msvc
        name: Setup MSVC env
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $inst    = & $vswhere -latest -products * -property instanceId      | Select-Object -First 1
          $install = & $vswhere -latest -products * -property installationPath | Select-Object -First 1
          if (-not $inst) { throw 'vswhere: no Visual Studio installation found' }
          Import-Module (Join-Path $install 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          $before = @{}
          Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }
          Enter-VsDevShell -VsInstanceId $inst -SkipAutomaticLocation -DevCmdArguments '-arch=${{ matrix.arch }} -no_logo' | Out-Null
          if (-not $env:VSCMD_ARG_TGT_ARCH) { throw 'VsDevShell did not initialise (no VSCMD_ARG_TGT_ARCH)' }
          Get-ChildItem env: | Where-Object { $before[$_.Name] -ne $_.Value } | ForEach-Object {
            "$($_.Name)=$($_.Value)" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - *setup-just

      - name: Check environment
        shell: pwsh
        run: |
          Write-Output $env:JAVA_HOME
          & "$env:JAVA_HOME\bin\java.exe" -version
          Write-Output $env:PROCESSOR_ARCHITECTURE
          Write-Output $env:VCPKG_ROOT

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: &cache-restore actions/cache/restore@v5
        with:
          path: &llvm-path |
            ./native/out/polyregion-Release-${{ matrix.arch }}-*-dist
          key: &llvm-key llvm-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        run: just build-llvm -DLLVM_USE_HOST_TOOLS=OFF

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: &cache-save actions/cache/save@v5
        with:
          path: *llvm-path
          key: *llvm-key

      - name: Restore device libs cache
        if: ${{ !env.ACT }}
        id: restore-device-libs
        uses: *cache-restore
        with:
          path: &devlibs-path ./native/thirdparty/device_libs
          key: &devlibs-key device-libs-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build device libs
        id: build-device-libs
        if: steps.restore-device-libs.outputs.cache-hit != 'true'
        run: just build-device-libs

      - name: Save device libs cache
        if: steps.build-device-libs.outcome == 'success'
        uses: *cache-save
        with:
          path: *devlibs-path
          key: *devlibs-key

      - name: Restore vcpkg cache
        if: ${{ !env.ACT }}
        id: restore-vcpkg
        uses: *cache-restore
        with:
          path: &vcpkg-path ./native/.vcpkg/vcpkg_installed
          key: &vcpkg-key vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ hashFiles('./native/vcpkg.json', './native/vcpkg-configuration.json', './native/toolchains/*.cmake', './native/.env') }}

      - name: Install vcpkg dependencies
        id: build-vcpkg
        if: steps.restore-vcpkg.outputs.cache-hit != 'true'
        run: just build-vcpkg-deps

      - name: Save vcpkg cache
        if: steps.build-vcpkg.outcome == 'success'
        uses: *cache-save
        with:
          path: *vcpkg-path
          key: *vcpkg-key

      - name: Build pass bundle (dso)
        run: just build-pass-native

      - name: Configure release build
        run: just configure

      - name: Build dist
        run: just build-dist

      - name: Build test dist
        run: just build-test-dist

      - name: Check artefact
        if: always()
        run: just check-dist-deps native/out/polyregion-Release-${{ matrix.arch }}-static-dist

      - name: Upload dist
        # v4: nektos/act#6022
        uses: &upload actions/upload-artifact@v7
        with:
          name: polyregion-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-static-dist/**
          if-no-files-found: error

      - name: Upload test dist
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: polyregion-tests-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist/**
          if-no-files-found: error

      - name: Build test dist (emulators profile)
        env:
          POLYREGION_TEST_PROFILE: emulators
        run: |
          del /s /q native\out\*.ids 2>nul
          just build-test-dist

      - name: Upload test dist (emulators)
        uses: *upload
        with:
          name: polyregion-tests-emulators-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist/**
          if-no-files-found: error

  check-dist:
    needs: build
    # Run for whichever arch built; the leg whose build failed has no artifact and goes red on download.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: &simple-matrix
          - arch: amd64
            runs_on: windows-2025-vs2026
          - arch: arm64
            runs_on: windows-11-arm
    runs-on: ${{ matrix.runs_on }}
    env: &arch-env
      POLYREGION_ARCH: ${{ matrix.arch }}
    steps:
      - uses: *checkout
      - *setup-java
      - *msvc
      - *setup-just

      - name: Download dist
        # v4: nektos/act#6022
        uses: &download actions/download-artifact@v8
        with:
          name: polyregion-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-static-dist

      - name: Run check-dist
        run: just check-dist

      - name: Annotate dist-check results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/build-dist-check-${{ matrix.arch }}-static/dist-check-results.xml
          label: dist-check

  test-native:
    needs: build
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - *setup-java

      - name: Download dist
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-static-dist

      - *msvc

      - name: Download test dist
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-tests-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist

      - name: Run native tests
        run: just test-native-dist

      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist/native-test-results.xml
          label: ctest

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: native-test-results-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist/native-test-results.xml
          if-no-files-found: warn

  test-scala:
    needs: build
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    defaults:
      run:
        shell: bash
    steps:
      - uses: *checkout
      - *setup-java
      - *setup-sbt
      - *setup-just

      - name: Download dist
        # v4: nektos/act#6022
        uses: *download
        with:
          name: polyregion-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-static-dist

      - name: Run munit suite
        env:
          POLYREGION_NATIVE_LIB_DIR: ${{ github.workspace }}\native\out\polyregion-Release-${{ matrix.arch }}-static-dist\lib
          POLYPASS_PLUGINS: ${{ github.workspace }}\native\out\polyregion-Release-${{ matrix.arch }}-static-dist\lib\libpolypass.dll
        run: |
          export PATH="${GITHUB_WORKSPACE}/native/out/polyregion-Release-${{ matrix.arch }}-static-dist/bin:${PATH}"
          just test-scala

      - name: Annotate scala results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: frontend/compiler-testsuite-scala/target/test-reports
          label: scala

      - name: Upload test results
        if: always()
        # v4: nektos/act#6022
        uses: *upload
        with:
          name: scala-test-results-windows-${{ matrix.arch }}-Release
          path: ./frontend/compiler-testsuite-scala/target/test-reports/
          if-no-files-found: warn

  build-emulators:
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - *setup-just
      - name: Restore emulators cache
        if: ${{ !env.ACT }}
        id: restore-emu
        uses: *cache-restore
        with:
          path: &emu-path ./emulators/out
          key: &emu-key emulators-windows-${{ matrix.arch }}-${{ hashFiles('./emulators/windows.bat') }}
      - name: Build emulators
        id: build-emulators
        if: steps.restore-emu.outputs.cache-hit != 'true'
        run: just build-emulators
      - name: Save emulators cache
        if: steps.build-emulators.outcome == 'success'
        uses: *cache-save
        with:
          path: *emu-path
          key: *emu-key
      - name: Pack emulators (tar preserves symlinks)
        run: tar czf emulators-out.tar.gz -C emulators out
      - name: Upload emulators artifact
        uses: *upload
        with:
          name: polyregion-emulators-windows-${{ matrix.arch }}
          path: emulators-out.tar.gz
          if-no-files-found: error

  test-native-with-emulators:
    needs: [build, build-emulators]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include: *simple-matrix
    runs-on: ${{ matrix.runs_on }}
    env: *arch-env
    steps:
      - uses: *checkout
      - name: Download dist
        uses: *download
        with:
          name: polyregion-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-Release-${{ matrix.arch }}-static-dist
      - name: Download test dist (emulators)
        uses: *download
        with:
          name: polyregion-tests-emulators-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist
      - name: Download emulators
        uses: *download
        with:
          name: polyregion-emulators-windows-${{ matrix.arch }}
          path: ./emulators
      - name: Unpack emulators
        run: tar xzf emulators\emulators-out.tar.gz -C emulators
      - name: Run emulator tests
        run: just test-native-dist emulators emulator-test-results
      - name: Annotate ctest results
        if: always()
        uses: ./.github/actions/annotate-junit
        with:
          junit: native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist/emulator-test-results.xml
          label: ctest-emulators
      - name: Upload test results
        if: always()
        uses: *upload
        with:
          name: emulator-test-results-windows-${{ matrix.arch }}-Release
          path: ./native/out/polyregion-test-Release-${{ matrix.arch }}-static-dist/emulator-test-results.xml
          if-no-files-found: warn
