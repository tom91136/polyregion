name: Windows builds (dummy)

on:
  workflow_call:
    inputs:
      build_arch:
        required: true
        type: string
      build_type:
        required: true
        type: string
      build_runs_on:
        required: true
        type: string
      check_runs_on:
        required: true
        type: string
      llvm_parallel_compile_jobs:
        required: true
        type: string
      llvm_parallel_link_jobs:
        required: true
        type: string
      flang_parallel_compile_jobs:
        required: true
        type: string
defaults:
  run:
    shell: cmd

jobs:
  build:
    runs-on: ${{ inputs.build_runs_on }}
    env:
      POLYREGION_LLVM_PARALLEL_COMPILE_JOBS: ${{ inputs.llvm_parallel_compile_jobs }}
      POLYREGION_LLVM_PARALLEL_LINK_JOBS: ${{ inputs.llvm_parallel_link_jobs }}
      POLYREGION_FLANG_PARALLEL_COMPILE_JOBS: ${{ inputs.flang_parallel_compile_jobs }}

    steps:
      - uses: actions/checkout@v5

      - name: Install LLVM
        # Without clang-cl the LLVM runtimes (compiler-rt builtins) fails because
        # cl.exe cannot parse GCC __attribute__ syntax used in e.g. aarch64/fp_mode.c. The
        # github-hosted runners normally ship LLVM at C:\Program Files\LLVM, but the
        # windows-11-arm runner may not, so install explicitly via winget.
        shell: pwsh
        env:
          LLVM_HOST_VERSION: "21.1.6"
        run: |
          if (-not (Get-Command clang-cl -ErrorAction SilentlyContinue)) {
            winget install --id LLVM.LLVM --version $env:LLVM_HOST_VERSION --silent --disable-interactivity --accept-source-agreements --accept-package-agreements
          }
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Setup JDK (${{ inputs.build_arch }})
        uses: ./.github/actions/setup-jdk
        with:
          build_arch: ${{ inputs.build_arch }}

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        shell: pwsh
        run: |
          Write-Output $env:JAVA_HOME
          & "$env:JAVA_HOME\bin\java.exe" -version
          Write-Output $env:PROCESSOR_ARCHITECTURE
          Write-Output $env:VCPKG_ROOT

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: |
            ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
            ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DLLVM_USE_HOST_TOOLS=OFF -DARCH=${{ inputs.build_arch }} -DACTION=LLVM -P build.cmake

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        id: save-llvm
        with:
          path: |
            ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
            ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-*-dist
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Configure release build
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CONFIGURE -P build.cmake

      - name: Build dist
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST -P build.cmake

      - name: Build test dist
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST_TEST -P build.cmake

      - name: Check artefact
        if: always()
        working-directory: ./native
        # XXX dumpbin needs an MSVC env to find link.exe
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          set "DIST=polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist"
          dir "%DIST%\bin"
          dir "%DIST%\lib"
          for %%B in (polyc.exe polycpp.exe polyfc.exe clang++.exe flang-new.exe) do (
            echo ---- %%B ----
            if exist "%DIST%\bin\%%B" (dumpbin /dependents "%DIST%\bin\%%B") else echo MISSING: %DIST%\bin\%%B
          )
          for %%L in (polyc-JNI.dll polyc-JNIshim.dll polyinvoke-JNI.dll) do (
            echo ---- %%L ----
            if exist "%DIST%\lib\%%L" (dumpbin /dependents "%DIST%\lib\%%L") else echo MISSING: %DIST%\lib\%%L
          )

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist/**
          if-no-files-found: error

      - name: Upload test dist
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-tests-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist/**
          if-no-files-found: error

  dist-check:
    needs: build
    runs-on: ${{ inputs.check_runs_on }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK (${{ inputs.build_arch }})
        uses: ./.github/actions/setup-jdk
        with:
          build_arch: ${{ inputs.build_arch }}

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: polyregion-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist

      - name: Run dist-check
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CHECK -P build.cmake

  unit-tests:
    needs: build
    runs-on: ${{ inputs.check_runs_on }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK (${{ inputs.build_arch }})
        uses: ./.github/actions/setup-jdk
        with:
          build_arch: ${{ inputs.build_arch }}

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: polyregion-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist

      - name: Download test dist
        uses: actions/download-artifact@v4
        with:
          name: polyregion-tests-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist

      - name: Run unit tests
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          set "DIST=%CD%\polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist"
          set "TESTS=%CD%\polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist"
          set "PATH=%DIST%\bin;%PATH%"
          set "POLYTEST_CLANG_DRIVER=%DIST%\bin\clang++.exe"
          set "POLYTEST_FLANG_DRIVER=%DIST%\bin\flang-new.exe"
          ctest --test-dir "%TESTS%" -LE device --output-on-failure --output-junit "%TESTS%\unit-test-results.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-test-${{ inputs.build_type }}-${{ inputs.build_arch }}-static-dist/unit-test-results.xml
          if-no-files-found: warn
