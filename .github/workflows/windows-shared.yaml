name: Windows builds

on:
  workflow_call:
    inputs:
      build_arch:
        required: true
        type: string
      build_type:
        required: true
        type: string
defaults:
  run:
    shell: cmd

jobs:
  build:
    runs-on: ${{ inputs.build_arch == 'arm64' && 'windows-11-arm' || 'windows-2025' }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK (${{ inputs.build_arch }})
        shell: pwsh
        working-directory: ./native
        run: |
          # Temurin 8 has no Windows aarch64 build; use Temurin 21 for arm64.
          switch ("${{ inputs.build_arch }}".ToLower()) {
            "amd64" { $jdk_arch = "x64";    $repo = "temurin8-binaries";  $version = "jdk8u352-b08";   $jdk_major = "8" }
            "arm64" { $jdk_arch = "aarch64"; $repo = "temurin21-binaries"; $version = "jdk-21.0.5+11"; $jdk_major = "21" }
            default {
              Write-Error "Invalid architecture for JDK: ${{ inputs.build_arch }}"
              break
            }
          }
          $version_short = $version.replace("-", "").replace("jdk", "").replace("+", "_")
          $url = "https://github.com/adoptium/${repo}/releases/download/${version}/OpenJDK${jdk_major}U-jdk_${jdk_arch}_windows_hotspot_${version_short}.zip"
          Write-Output "Downloading JDK from $url"
          Invoke-WebRequest -Uri $url -OutFile jdk_${jdk_arch}.zip
          Expand-Archive -Path .\jdk_${jdk_arch}.zip -DestinationPath .\jdk_${jdk_arch}
          $extracted_dir = (Get-ChildItem -Directory .\jdk_${jdk_arch}).Name
          echo "JAVA_HOME=${PWD}\jdk_${jdk_arch}\$extracted_dir" >> $env:GITHUB_ENV

      - name: Dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.2
        with:
          path: ./native/.env

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

      - name: Check environment
        shell: pwsh
        run: |
          Write-Output $env:JAVA_HOME
          & "$env:JAVA_HOME\bin\java.exe" -version
          Write-Output $env:PROCESSOR_ARCHITECTURE
          Write-Output $env:VCPKG_ROOT

      - name: Restore LLVM cache
        if: ${{ !env.ACT }}
        id: restore-llvm
        uses: actions/cache/restore@v5
        with:
          path: ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Build LLVM
        id: build-llvm
        if: steps.restore-llvm.outputs.cache-hit != 'true'
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DLLVM_USE_HOST_TOOLS=OFF -DARCH=${{ inputs.build_arch }} -DACTION=LLVM -P build.cmake

      - name: Save LLVM cache
        if: steps.build-llvm.outcome == 'success'
        uses: actions/cache/save@v5
        id: save-llvm
        with:
          path: ./native/llvm-${{ inputs.build_type }}-${{ inputs.build_arch }}-*
          key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build_arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

      - name: Configure release build
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }} 
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CONFIGURE -P build.cmake

      - name: Release build polycpp
        working-directory: ./native
        if: always()
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }} 
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=BUILD -DTARGET=polycpp -P build.cmake

      - name: Release build polyrt-exec
        working-directory: ./native
        if: always()
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }} 
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=BUILD -DTARGET=polyrt-exec -P build.cmake

      - name: Release build polyc-bin
        working-directory: ./native
        if: always()
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }} 
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=BUILD -DTARGET=polyc-bin -P build.cmake

      - name: Release build shim
        working-directory: ./native
        if: always()
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }} 
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=BUILD -DTARGET=polyc-JNIshim -P build.cmake

      - name: Release build runtime
        working-directory: ./native
        if: always()
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }} 
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=BUILD -DTARGET=polyrt-JNI -P build.cmake

      - name: Release build compiler
        working-directory: ./native
        if: always()
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }} 
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=BUILD -DTARGET=polyc-JNI -P build.cmake

      - name: Check artefact
        if: always()
        shell: pwsh
        working-directory: ./native
        run: |
          ls .\build-windows-${{ inputs.build_arch }}\bindings\jvm\ | Select-Object Name, @{Name="MegaBytes";Expression={$_.Length / 1MB}}
          ls .\build-windows-${{ inputs.build_arch }}\polyc         | Select-Object Name, @{Name="MegaBytes";Expression={$_.Length / 1MB}}
          ls .\build-windows-${{ inputs.build_arch }}\polycpp       | Select-Object Name, @{Name="MegaBytes";Expression={$_.Length / 1MB}}
          ls .\build-windows-${{ inputs.build_arch }}\polyrt        | Select-Object Name, @{Name="MegaBytes";Expression={$_.Length / 1MB}}

      - name: Build dist
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=DIST -P build.cmake

      - name: Package dist
        shell: pwsh
        working-directory: ./native
        run: Compress-Archive -Path .\polyregion-${{ inputs.build_type }}-${{ inputs.build_arch }}-dylib-dist\* -DestinationPath polyregion-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}.zip

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: polyregion-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}
          path: ./native/polyregion-windows-${{ inputs.build_arch }}-${{ inputs.build_type }}.zip
          if-no-files-found: error

      - name: Check dist
        working-directory: ./native
        run: |
          call setup_msvc_env.bat ${{ inputs.build_arch }}
          cmake -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DARCH=${{ inputs.build_arch }} -DACTION=CHECK -P build.cmake
