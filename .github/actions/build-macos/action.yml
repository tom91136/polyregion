name: Build polyregion (macOS)
description: Build and stage the polyregion macOS dist + test dist for one arch.

inputs:
  arch:
    description: Target arch (arm64 or x86_64).
    required: true
  act:
    description: Set from the workflow env.ACT so the action can skip cache steps under local act.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install dependencies
      # gcc brings gfortran which flang-rt needs at LLVM-runtimes configure time.
      shell: bash
      run: |
        brew install --quiet llvm lld cmake ninja zlib gcc sbt
        echo "JAVA_HOME=$(/usr/libexec/java_home)" >> $GITHUB_ENV
        echo "$(brew --prefix llvm)/bin"          >> $GITHUB_PATH

    - name: Dotenv
      id: dotenv
      uses: falti/dotenv-action@v1.2
      with:
        path: ./native/.env

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

    - name: Check environment
      shell: bash
      run: |
        clang --version
        llvm-tblgen --version
        echo "JAVA_HOME=$JAVA_HOME"
        echo "VCPKG_ROOT=$VCPKG_ROOT"

    - name: Restore LLVM cache
      if: ${{ inputs.act != 'true' }}
      id: restore-llvm
      uses: actions/cache/restore@v5
      with:
        path: |
          ./native/out/polyregion-Release-${{ inputs.arch }}-*-dist
        key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

    - name: Setup just
      uses: extractions/setup-just@v4

    - name: Build LLVM
      id: build-llvm
      if: steps.restore-llvm.outputs.cache-hit != 'true'
      shell: bash
      run: just llvm

    - name: Save LLVM cache
      if: steps.build-llvm.outcome == 'success'
      uses: actions/cache/save@v5
      with:
        path: |
          ./native/out/polyregion-Release-${{ inputs.arch }}-*-dist
        key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

    - name: Restore device libs cache
      if: ${{ inputs.act != 'true' }}
      id: restore-device-libs
      uses: actions/cache/restore@v5
      with:
        path: |
          ./native/thirdparty/device_libs
          !./native/thirdparty/device_libs/.staging
        key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

    - name: Build device libs
      id: build-device-libs
      if: steps.restore-device-libs.outputs.cache-hit != 'true'
      shell: bash
      run: just device-libs

    - name: Save device libs cache
      if: steps.build-device-libs.outcome == 'success'
      uses: actions/cache/save@v5
      with:
        path: |
          ./native/thirdparty/device_libs
          !./native/thirdparty/device_libs/.staging
        key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake') }}

    - name: Install vcpkg dependencies
      shell: bash
      run: just vcpkg-deps

    - name: Build pass bundle (dso)
      shell: bash
      run: just pass-native

    - name: Configure release build
      shell: bash
      run: just configure

    - name: Build dist
      shell: bash
      run: just dist

    - name: Build test dist
      shell: bash
      run: just test-dist

    - name: Check artefact
      if: always()
      working-directory: ./native
      shell: bash
      run: |
        DIST=out/polyregion-Release-${{ inputs.arch }}-dylib-dist
        ls -lah "$DIST/bin" "$DIST/lib"
        inspect () {
          local f="$1"
          if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
          file "$f"
          otool -L "$f"
          echo "----"
        }
        for b in polyc polycpp polyfc clang++ flang-new; do
          inspect "$DIST/bin/$b"
        done
        for l in "$DIST"/lib/libpolyc-JNI.dylib "$DIST"/lib/libpolyc-JNIshim.dylib "$DIST"/lib/libpolyinvoke-JNI.dylib; do
          inspect "$l"
        done

    - name: Upload dist
      # v4: nektos/act#6022
      uses: actions/upload-artifact@v4
      with:
        name: polyregion-darwin-${{ inputs.arch }}-Release
        path: ./native/out/polyregion-Release-${{ inputs.arch }}-dylib-dist/**
        if-no-files-found: error

    - name: Upload test dist
      # v4: nektos/act#6022
      uses: actions/upload-artifact@v4
      with:
        name: polyregion-tests-darwin-${{ inputs.arch }}-Release
        path: ./native/out/polyregion-test-Release-${{ inputs.arch }}-dylib-dist/**
        if-no-files-found: error
