name: Build polyregion (Linux)
description: Build and stage the polyregion Linux dist + test dist for one arch.

inputs:
  arch:
    description: Target arch (x86_64 or aarch64).
    required: true
  act:
    description: Set from the workflow env.ACT so the action can take the local act fast-paths.
    required: false
    default: ''
  sysroot-variant:
    # AL8 = glibc 2.28, gcc-toolset-12 libstdc++
    description: Sysroot variant tag.
    required: false
    default: al8

runs:
  using: composite
  steps:
    - name: Free up disk space
      # Fresh LLVM builds exhaust the stock runner's ~14 GB; drop the big preinstalled dirs only.
      if: ${{ inputs.act != 'true' }}
      uses: justinthelaw/maximize-github-runner-space@v0.9.0
      with:
        cleanup-profile: custom
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-dotnet: 'true'

    - name: Max parallelism under act
      if: ${{ inputs.act == 'true' }}
      shell: bash
      run: |
        echo "POLYREGION_LLVM_PARALLEL_COMPILE_JOBS=" >> "$GITHUB_ENV"
        echo "POLYREGION_LLVM_PARALLEL_LINK_JOBS=" >> "$GITHUB_ENV"
        echo "POLYREGION_FLANG_PARALLEL_COMPILE_JOBS=" >> "$GITHUB_ENV"

    - name: Install dependencies
      # clang-tools provides clang-scan-deps (cmake >= 3.28 uses it for C++20 module deps).
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build clang clang-tools lld llvm g++ gfortran libcrypt-dev libltdl-dev zlib1g-dev python3-requests

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21'
        cache: sbt

    - name: Setup sbt
      uses: sbt/setup-sbt@v1.1.18

    - name: Dotenv
      id: dotenv
      uses: falti/dotenv-action@v1.2
      with:
        path: ./native/.env

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: "${{ steps.dotenv.outputs.vcpkg_commit }}"

    - name: Check environment
      shell: bash
      run: |
        clang --version
        llvm-tblgen --version
        echo "JAVA_HOME=$JAVA_HOME"
        echo "VCPKG_ROOT=$VCPKG_ROOT"

    - name: Restore sysroot cache
      if: ${{ inputs.act != 'true' }}
      id: restore-sysroot
      uses: actions/cache/restore@v5
      with:
        path: ./native/out/sysroot-build/${{ inputs.sysroot-variant }}/sysroot-${{ inputs.sysroot-variant }}-${{ inputs.arch }}.tar.xz
        key: sysroot-${{ inputs.sysroot-variant }}-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/make_sysroot.sh') }}

    - name: Detect existing sysroot tarball (act fast-path)
      if: ${{ inputs.act == 'true' }}
      id: act-sysroot-probe
      shell: bash
      run: |
        [ -f native/out/sysroot-build/${{ inputs.sysroot-variant }}/sysroot-${{ inputs.sysroot-variant }}-${{ inputs.arch }}.tar.xz ] && echo "found=true" >> "$GITHUB_OUTPUT" || true

    - name: Build sysroot
      id: build-sysroot
      if: steps.restore-sysroot.outputs.cache-hit != 'true' && steps.act-sysroot-probe.outputs.found != 'true'
      working-directory: ./native
      shell: bash
      run: ./make_sysroot.sh ${{ inputs.arch }}

    - name: Save sysroot cache
      if: steps.build-sysroot.outcome == 'success'
      uses: actions/cache/save@v5
      with:
        path: ./native/out/sysroot-build/${{ inputs.sysroot-variant }}/sysroot-${{ inputs.sysroot-variant }}-${{ inputs.arch }}.tar.xz
        key: sysroot-${{ inputs.sysroot-variant }}-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/make_sysroot.sh') }}

    - name: Prepare sysroot
      working-directory: ./native
      shell: bash
      run: |
        STAGE=out/sysroot-build/${{ inputs.sysroot-variant }}/extracted-${{ inputs.arch }}
        rm -rf "$STAGE"
        mkdir -p "$STAGE"
        tar xf out/sysroot-build/${{ inputs.sysroot-variant }}/sysroot-${{ inputs.sysroot-variant }}-${{ inputs.arch }}.tar.xz -C "$STAGE"
        echo "SYSROOT_PATH=$PWD/$STAGE" >> "$GITHUB_ENV"

    - name: Restore LLVM cache
      if: ${{ inputs.act != 'true' }}
      id: restore-llvm
      uses: actions/cache/restore@v5
      with:
        path: |
          ./native/out/polyregion-Release-${{ inputs.arch }}-*-dist
        key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './native/make_sysroot.sh') }}

    - name: Setup just
      uses: extractions/setup-just@v4

    - name: Detect existing LLVM/device-libs (act fast-path)
      if: ${{ inputs.act == 'true' }}
      id: act-cache-probe
      shell: bash
      run: |
        [ -x native/out/polyregion-Release-${{ inputs.arch }}-dylib-dist/bin/clang++ ] && echo "llvm=true" >> "$GITHUB_OUTPUT" || true
        [ -d native/thirdparty/device_libs ] && [ -n "$(ls -A native/thirdparty/device_libs 2>/dev/null)" ] && echo "device-libs=true" >> "$GITHUB_OUTPUT" || true

    - name: Build LLVM
      id: build-llvm
      if: steps.restore-llvm.outputs.cache-hit != 'true' && steps.act-cache-probe.outputs.llvm != 'true'
      shell: bash
      run: just llvm

    - name: Save LLVM cache
      if: steps.build-llvm.outcome == 'success'
      uses: actions/cache/save@v5
      with:
        path: |
          ./native/out/polyregion-Release-${{ inputs.arch }}-*-dist
        key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './native/make_sysroot.sh') }}

    - name: Restore device libs cache
      if: ${{ inputs.act != 'true' }}
      id: restore-device-libs
      uses: actions/cache/restore@v5
      with:
        path: |
          ./native/thirdparty/device_libs
          !./native/thirdparty/device_libs/.staging
        key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './native/make_sysroot.sh') }}

    - name: Build device libs
      id: build-device-libs
      if: steps.restore-device-libs.outputs.cache-hit != 'true' && steps.act-cache-probe.outputs.device-libs != 'true'
      shell: bash
      run: just device-libs

    - name: Save device libs cache
      if: steps.build-device-libs.outcome == 'success'
      uses: actions/cache/save@v5
      with:
        path: |
          ./native/thirdparty/device_libs
          !./native/thirdparty/device_libs/.staging
        key: device-libs-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ hashFiles('./native/cmake/prepare_*_dist.cmake', './native/build_llvm.cmake', './native/build_llvm_cache.cmake', './native/ProjectConfig.cmake', './native/toolchains/*.cmake', './native/cmake/sysroot_gcc_dir.cmake', './native/make_sysroot.sh') }}

    - name: Install vcpkg dependencies
      shell: bash
      run: just vcpkg-deps

    - name: Build pass bundle (dso)
      shell: bash
      run: just pass-native

    - name: Configure release build
      shell: bash
      run: just configure

    - name: Build dist
      shell: bash
      run: just dist

    - name: Build test dist
      shell: bash
      run: just test-dist

    - name: Check artefact
      if: always()
      working-directory: ./native
      shell: bash
      run: |
        DIST=out/polyregion-Release-${{ inputs.arch }}-dylib-dist
        ls -lah "$DIST/bin" "$DIST/lib"
        inspect () {
          local f="$1"
          if [[ ! -f "$f" ]]; then echo "MISSING: $f"; return; fi
          file "$f"
          objdump -p "$f" | grep -E '^\s+NEEDED' || true
          echo "----"
        }
        for b in polyc polycpp polyfc clang++ flang-new; do
          inspect "$DIST/bin/$b"
        done
        for l in "$DIST"/lib/libpolyc-JNI.so "$DIST"/lib/libpolyc-JNIshim.so "$DIST"/lib/libpolyinvoke-JNI.so; do
          inspect "$l"
        done

    - name: Upload dist
      # v4: nektos/act#6022
      uses: actions/upload-artifact@v4
      with:
        name: polyregion-linux-${{ inputs.arch }}-Release
        path: ./native/out/polyregion-Release-${{ inputs.arch }}-dylib-dist/**
        if-no-files-found: error

    - name: Upload test dist
      # v4: nektos/act#6022
      uses: actions/upload-artifact@v4
      with:
        name: polyregion-tests-linux-${{ inputs.arch }}-Release
        path: ./native/out/polyregion-test-Release-${{ inputs.arch }}-dylib-dist/**
        if-no-files-found: error
